.card{background:#fff;border-radius:14px;padding:2rem;width:500px;box-shadow:0 8px 32px rgba(0,0,0,.12);}

.log{margin-top:1rem;background:#f0f1f3;border-radius:8px;padding:12px;font-size:12px;font-family:monospace;height:220px;overflow-y:auto;line-height:1.8;}

.progress-bar{height:8px;background:#e0e2e6;border-radius:4px;margin:12px 0;overflow:hidden;}

</style>

function log(msg,cls){
  var d=document.getElementById('log');
  d.innerHTML+='<div class="'+(cls||'')+'">'+ msg+'</div>';
  d.scrollTop=d.scrollHeight;
}

function doLogin(){
  var e=document.getElementById('email').value.trim();
  var p=document.getElementById('pass').value;
  if(!e||!p){alert('Escribe correo y contraseña.');return;}

      document.getElementById('login-sec').style.display='none';
      document.getElementById('import-sec').style.display='block';

    })

}

async function startImport(){
  var btn=document.getElementById('imp-btn');
  btn.disabled=true; btn.textContent='Importando...';
  var total=EQUIPOS.length, done=0, errors=0;
  log('<span class="info">Iniciando importación de '+total+' equipos...</span>');

  // Borrar colección equipos primero
  log('Limpiando registros anteriores...');
  try{
    var snap = await db.collection('equipos').get();
    var batch = db.batch();
    var bCount = 0;
    snap.docs.forEach(function(d){
      batch.delete(d.ref);
      bCount++;
      if(bCount===499){ batch.commit(); batch=db.batch(); bCount=0; }
    });
    if(bCount>0) await batch.commit();
    log('✓ Registros anteriores eliminados.','ok');
  }catch(e){ log('⚠ No se pudieron eliminar registros anteriores: '+e.message,'err'); }

  // Importar en lotes de 400
  var batchSize = 400;
  for(var i=0; i<total; i+=batchSize){
    var chunk = EQUIPOS.slice(i, i+batchSize);
    var b = db.batch();
    chunk.forEach(function(eq){
      b.set(db.collection('equipos').doc(eq.id), eq);
    });
    try{
      await b.commit();
      done += chunk.length;
      var pct = Math.round(done/total*100);
      document.getElementById('prog').style.width=pct+'%';
      log('✓ Lote guardado: '+done+'/'+total+' ('+pct+'%)','ok');
    }catch(e){
      errors++;
      log('✗ Error en lote: '+e.message,'err');
    }
  }

  if(errors===0){
    log('','');
    log('🎉 Importación completada: '+done+' equipos en Firebase.','ok');
    btn.textContent='✓ Completado';
    btn.style.background='#34a853';
  }else{
    log('⚠ Completado con '+errors+' error(es).','err');
    btn.disabled=false;
    btn.textContent='Reintentar';
  }
}
