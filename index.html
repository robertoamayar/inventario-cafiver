<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InventarioTech — APP CAFIVER</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);min-height:100vh;color:#1c1e21;font-size:13px;}
body.app-mode{background:#eef2f7;}
.hidden{display:none!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#c8cad0;border-radius:3px;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.lcard{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.35);}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:8px;border:1px solid #dde1e7;background:#fff;color:#1c1e21;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{background:#f0f2f5;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-blue{background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(26,115,232,.35);}
.btn-blue:hover{background:linear-gradient(135deg,#1557b0,#0d3c7a);}
.btn-red{background:#fce8e6;color:#ea4335;border-color:transparent;}
.btn-green{background:#e6f4ea;color:#34a853;border-color:transparent;}
.fi{font-size:13px;padding:10px 12px;border:1.5px solid #e0e2e6;border-radius:10px;outline:none;font-family:'Inter',sans-serif;width:100%;transition:border-color .15s;}
.fi:focus{border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,.12);}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{height:56px;background:#fff;border-bottom:1px solid #e8eaed;display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-right:8px;}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#1a73e8,#0d47a1);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:0 2px 6px rgba(26,115,232,.4);}
.proj-name{font-size:15px;font-weight:700;color:#1c1e21;}
.proj-sub{font-size:11px;color:#9aa0a6;}
.tnav{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;color:#5f6368;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;transition:all .15s;display:flex;align-items:center;gap:5px;}
.tnav:hover{background:#f0f2f5;color:#1c1e21;}
.tnav.on{background:#e8f0fe;color:#1a73e8;font-weight:600;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.user-pill{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;background:#f0f2f5;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s;}
.user-pill:hover{background:#e8eaed;}
.cu-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.sync-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.sync-pill.ok{background:#e6f4ea;color:#2d6a2d;}
.sync-pill.saving{background:#e8f0fe;color:#1a73e8;}
.sync-pill.error{background:#fce8e6;color:#c0392b;}

/* VIEWS */
.view-wrap{flex:1;overflow:auto;padding:1.25rem 1.75rem;background:#eef2f7;}

/* DASHBOARD */
.dash-title{font-size:18px;font-weight:700;color:#1c1e21;margin-bottom:4px;}
.dash-sub{font-size:12px;color:#9aa0a6;margin-bottom:20px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #e8eaed;transition:transform .15s,box-shadow .15s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1);}
.stat-card .lbl{font-size:11px;font-weight:600;color:#9aa0a6;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.stat-card .val{font-size:26px;font-weight:700;line-height:1;}
.stat-card .val.blue{color:#1a73e8;} .stat-card .val.green{color:#34a853;} .stat-card .val.amber{color:#f9ab00;} .stat-card .val.red{color:#ea4335;}
.stat-card .trend{font-size:11px;color:#9aa0a6;margin-top:4px;}

/* CARDS TABLE */
.tbl-box{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #e8eaed;}
.tbl-hdr{padding:12px 16px;background:#fff;border-bottom:1px solid #e8eaed;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.tbl-hdr-title{font-size:13px;font-weight:700;color:#1c1e21;}
.tbl-tools{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9aa0a6;padding:9px 12px;border-bottom:1px solid #e8eaed;background:#fafbfc;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{background:#f0f2f5;color:#5f6368;}
td{padding:9px 12px;border-bottom:1px solid #f0f2f5;font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f7f9ff;}
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;line-height:1.6;}
.pill-desktop{background:#e8f0fe;color:#1a73e8;}
.pill-laptop{background:#e6f4ea;color:#2e7d32;}
.pill-servidor{background:#f3e8fd;color:#7b1fa2;}
.pill-impresora{background:#fff3e0;color:#e65100;}
.pill-otro{background:#f0f2f5;color:#5f6368;}
.pill-bueno{background:#e6f4ea;color:#2e7d32;}
.pill-regular{background:#fff8e1;color:#f57f17;}
.pill-malo{background:#fce8e6;color:#c62828;}
.pill-baja{background:#f0f2f5;color:#9aa0a6;}
.fi-sm{font-size:12px;padding:6px 10px;border:1.5px solid #e0e2e6;border-radius:8px;outline:none;font-family:'Inter',sans-serif;background:#fff;transition:border-color .15s;}
.fi-sm:focus{border-color:#1a73e8;}
.icon-btn{padding:5px 8px;border:1px solid #e0e2e6;border-radius:7px;cursor:pointer;background:#fff;font-size:12px;transition:all .15s;}
.icon-btn:hover{background:#f0f2f5;border-color:#c8cad0;}
.empty-state{padding:2.5rem;text-align:center;color:#9aa0a6;font-size:13px;}

/* MODAL */
#overlay-form,#confirm-overlay{position:fixed;inset:0;background:rgba(15,20,35,.5);display:flex;align-items:flex-start;justify-content:center;z-index:400;padding:20px;overflow-y:auto;backdrop-filter:blur(2px);}
.modal-card{background:#fff;border-radius:16px;width:100%;max-width:720px;box-shadow:0 16px 48px rgba(0,0,0,.22);margin:auto;}
.modal-card.wide{max-width:900px;}
.modal-hd{padding:16px 20px;border-bottom:1px solid #e8eaed;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;border-radius:16px 16px 0 0;}
.modal-hd h3{font-size:15px;font-weight:700;}
.modal-body{padding:16px 20px 20px;}
.modal-footer{padding:12px 20px;border-top:1px solid #e8eaed;display:flex;justify-content:flex-end;gap:8px;background:#fafbfc;border-radius:0 0 16px 16px;}
.form-section{font-size:10px;font-weight:700;color:#1a73e8;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;padding-bottom:5px;border-bottom:2px solid #e8f0fe;}
.af{margin-bottom:10px;}
.af label{display:block;font-size:10px;font-weight:700;color:#9aa0a6;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.af input,.af select,.af textarea{width:100%;font-size:12px;padding:7px 10px;border:1.5px solid #e0e2e6;border-radius:8px;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s;}
.af input:focus,.af select:focus,.af textarea:focus{border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,.1);}
.af textarea{resize:vertical;min-height:70px;line-height:1.5;}
.af-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.af-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.confirm-card{background:#fff;border-radius:16px;padding:1.5rem;width:360px;box-shadow:0 16px 48px rgba(0,0,0,.22);}
.confirm-card h3{font-size:15px;font-weight:700;margin-bottom:.75rem;}
.confirm-card p{font-size:13px;color:#5f6368;line-height:1.6;margin-bottom:1rem;}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end;}

/* DETAIL PANEL */
#dp{position:fixed;top:0;right:0;width:520px;height:100vh;background:#fff;border-left:1px solid #e8eaed;z-index:200;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.12);transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
#dp.open{transform:translateX(0);}
#dp-overlay{position:fixed;inset:0;z-index:199;display:none;background:rgba(0,0,0,.1);}
#dp-overlay.on{display:block;}
.dp-hd{padding:16px 20px 12px;border-bottom:1px solid #e8eaed;flex-shrink:0;background:#fafbfc;}
.dp-tabs{display:flex;border-bottom:1px solid #e8eaed;padding:0 20px;flex-shrink:0;background:#fff;}
.dp-tab{padding:10px 16px;font-size:12px;font-weight:600;color:#9aa0a6;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:'Inter',sans-serif;}
.dp-tab.on{color:#1a73e8;border-bottom-color:#1a73e8;}
.dp-body{flex:1;overflow-y:auto;padding:16px 20px;}
.dp-row{display:grid;grid-template-columns:140px 1fr;align-items:start;padding:8px 0;border-bottom:1px solid #f0f2f5;}
.dp-row:last-child{border-bottom:none;}
.dp-key{font-size:10px;color:#9aa0a6;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding-top:2px;}
.dp-val{font-size:13px;font-weight:500;word-break:break-all;color:#1c1e21;}
.dp-sec-t{font-size:10px;font-weight:700;color:#1a73e8;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 6px;padding-bottom:5px;border-bottom:2px solid #e8f0fe;}

/* QR */
.qr-toolbar{padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e8eaed;background:#fff;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.qr-grid{display:flex;flex-wrap:wrap;gap:16px;padding:20px;}
.qr-card{background:#fff;border:1px solid #e8eaed;border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;width:195px;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:box-shadow .15s;}
.qr-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12);}
.qr-card .qr-id{font-size:13px;font-weight:700;color:#1a73e8;}
.qr-card .qr-lbl{font-size:12px;font-weight:600;text-align:center;color:#1c1e21;}
.qr-card .qr-sub{font-size:11px;color:#9aa0a6;text-align:center;}

/* REPARACIONES */
.rep-card{background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:14px 18px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.rep-card .rep-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.rep-card .rep-title{font-size:13px;font-weight:700;}
.rep-card .rep-meta{font-size:12px;color:#9aa0a6;margin-top:2px;}

/* FICHA QR IMPRIMIBLE */
.ficha-qr{display:none;}
@media print{
  body *{display:none!important;}
  .ficha-qr{display:block!important;font-family:'Inter',sans-serif;padding:20px;max-width:600px;margin:0 auto;}
  .ficha-qr *{display:block!important;}
  .ficha-header{display:flex!important;flex-direction:row!important;align-items:flex-start!important;gap:20px!important;border-bottom:2px solid #1a73e8!important;padding-bottom:14px!important;margin-bottom:14px!important;}
  .ficha-secciones{display:block!important;}
  .ficha-sec{margin-bottom:12px!important;}
  .ficha-sec-title{font-size:9px!important;font-weight:700!important;text-transform:uppercase!important;letter-spacing:.06em!important;color:#1a73e8!important;margin-bottom:5px!important;border-bottom:1px solid #e0e2e6!important;padding-bottom:3px!important;}
  .ficha-grid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:4px 16px!important;}
  .ficha-row{display:flex!important;flex-direction:column!important;padding:2px 0!important;}
  .ficha-k{font-size:8px!important;color:#9aa0a6!important;font-weight:700!important;text-transform:uppercase!important;}
  .ficha-v{font-size:11px!important;font-weight:600!important;color:#1c1e21!important;}
  .rep-hist-item{border:1px solid #e0e2e6!important;border-radius:6px!important;padding:6px 8px!important;margin-bottom:5px!important;}
}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1c1e21;color:#fff;padding:9px 22px;border-radius:10px;font-size:12px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999;max-width:90vw;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.25);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══════════════════════════════════
   RESPONSIVE MÓVIL
═══════════════════════════════════ */
@media (max-width: 768px) {
  body.app-mode{background:#eef2f7;}

  /* TOPBAR móvil */
  .topbar{height:auto;flex-wrap:wrap;padding:10px 12px;gap:6px;}
  .logo-wrap{flex:1;}
  .proj-sub{display:none;}
  .tnav{padding:5px 8px;font-size:11px;}
  .topbar-right{width:100%;justify-content:flex-end;gap:5px;border-top:1px solid #e8eaed;padding-top:8px;margin-top:2px;}
  #cur-nm{display:none;}

  /* VIEWS */
  .view-wrap{padding:.75rem 1rem;}

  /* DASHBOARD */
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;}
  .stat-card{padding:12px 14px;}
  .stat-card .val{font-size:22px;}
  .dash-title{font-size:16px;}
  #view-dashboard .tbl-box:last-child > div:last-child{overflow-x:auto;}

  /* Ocultar columnas menos importantes en tabla */
  table th:nth-child(3),table td:nth-child(3),
  table th:nth-child(7),table td:nth-child(7),
  table th:nth-child(8),table td:nth-child(8),
  table th:nth-child(10),table td:nth-child(10){display:none;}

  /* FILTROS en columna */
  .tbl-hdr{flex-direction:column;align-items:stretch;}
  .tbl-tools{flex-direction:column;gap:6px;}
  .tbl-tools .fi-sm{width:100%!important;}
  .tbl-tools .btn{width:100%;justify-content:center;}

  /* DETAIL PANEL */
  #dp{width:100%;border-radius:20px 20px 0 0;top:auto;bottom:0;height:88vh;transform:translateY(100%);box-shadow:0 -8px 32px rgba(0,0,0,.15);}
  #dp.open{transform:translateY(0);}

  /* MODAL */
  .modal-card,.modal-card.wide{max-width:100%;border-radius:20px 20px 0 0;position:fixed;bottom:0;left:0;right:0;margin:0;max-height:90vh;}
  #overlay-form,#confirm-overlay{align-items:flex-end;padding:0;}
  .af-g2,.af-g3{grid-template-columns:1fr;}

  /* QR */
  .qr-grid{padding:12px;gap:12px;}
  .qr-card{width:calc(50% - 6px);}
  .qr-toolbar{flex-direction:column;align-items:stretch;gap:8px;}
  .qr-toolbar .fi-sm{width:100%!important;}
  .qr-toolbar .btn{width:100%;justify-content:center;}

  /* REPARACIONES */
  .rep-card .rep-hd{flex-direction:column;gap:6px;}

  /* DASHBOARD grid una columna en móvil */
  #view-dashboard > div:last-child{grid-template-columns:1fr!important;}

  /* CONFIRM */
  .confirm-card{width:90%;border-radius:16px;}

  /* LOGIN */
  .lcard{width:100%;max-width:360px;}
}

@media (max-width: 480px) {
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .qr-card{width:calc(50% - 6px);}
  .tnav span{display:none;}
  .tnav{font-size:16px;padding:6px 8px;}
}


@media (max-width: 480px) {
  .tnav-txt{display:none;}
  .tnav-icon{font-size:17px;}
  .tnav{padding:6px 10px;}
}


/* ANTIGÜEDAD / SEMÁFORO */
.vida-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.vida-verde{background:#e6f4ea;color:#2e7d32;}
.vida-amarillo{background:#fff8e1;color:#f57f17;}
.vida-rojo{background:#fce8e6;color:#c62828;}
tr.row-rojo td{background:#fff5f5!important;}
tr.row-rojo:hover td{background:#fce8e6!important;}
tr.row-amarillo td{background:#fffbf0!important;}
tr.row-amarillo:hover td{background:#fff3cd!important;}

/* TRANSFERENCIA */
.transfer-modal{position:fixed;inset:0;background:rgba(15,20,35,.5);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(2px);}
.transfer-card{background:#fff;border-radius:16px;width:100%;max-width:480px;box-shadow:0 16px 48px rgba(0,0,0,.22);}

/* HISTORIAL ASIGNACIONES */
.asign-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0f2f5;}
.asign-item:last-child{border-bottom:none;}
.asign-dot{width:10px;height:10px;border-radius:50%;background:#e0e2e6;flex-shrink:0;margin-top:4px;}
.asign-dot.active{background:#34a853;}
.asign-info{flex:1;}
.asign-name{font-size:13px;font-weight:600;color:#1c1e21;}
.asign-meta{font-size:11px;color:#9aa0a6;margin-top:1px;}
.asign-motivo{font-size:11px;color:#5f6368;margin-top:2px;}


/* ETIQUETAS */
.etiq-grid{display:flex;flex-wrap:wrap;gap:0;background:#fff;}
.etiq-hoja{background:#fff;width:21.59cm;margin:0 auto 20px;padding:1cm;box-shadow:0 4px 20px rgba(0,0,0,.15);display:grid;grid-template-columns:repeat(3,5cm);grid-auto-rows:2.5cm;gap:0;}
.etiq{width:5cm;height:2.5cm;border:.5pt solid #ddd;display:flex;align-items:center;padding:1.5mm 2mm;gap:2mm;background:#fff;overflow:hidden;position:relative;cursor:pointer;transition:box-shadow .15s;}
.etiq:hover{box-shadow:inset 0 0 0 2px #1a73e8;}
.etiq .elogo{width:14mm;height:14mm;flex-shrink:0;object-fit:contain;}
.etiq .einfo{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5mm;}
.etiq .eqr{width:13mm;height:13mm;}
.etiq .eid{font-size:6pt;font-weight:700;letter-spacing:.3px;text-align:center;font-family:Arial,sans-serif;color:#000;}
.etiq .enombre{font-size:4.5pt;color:#555;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:20mm;font-family:Arial,sans-serif;}
.etiq.vacia{border:.5pt dashed #eee;background:#fafafa;cursor:default;}
.etiq.vacia:hover{box-shadow:none;}

/* PRINT ETIQUETAS */
@media print {
  .print-etiq-single{display:block!important;}
  body > *:not(.print-etiq-single){display:none!important;}
  .print-etiq-single{
    width:5cm;height:2.5cm;border:.5pt solid #999;
    display:flex;align-items:center;padding:1.5mm 2mm;gap:2mm;
    overflow:hidden;position:fixed;top:1cm;left:1cm;
    font-family:Arial,sans-serif;
  }
  .print-etiq-single .elogo{width:14mm;height:14mm;object-fit:contain;}
  .print-etiq-single .einfo{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5mm;}
  .print-etiq-single .eqr{width:13mm;height:13mm;}
  .print-etiq-single .eid{font-size:6pt;font-weight:700;letter-spacing:.3px;}
  .print-etiq-single .enombre{font-size:4.5pt;color:#555;text-align:center;}
  @page{size:5cm 2.5cm;margin:0;}
}
@media print {
  .print-hoja-etiq{display:block!important;}
  body > *:not(.print-hoja-etiq){display:none!important;}
  .print-hoja-etiq .etiq-hoja{box-shadow:none;margin:0;page-break-after:always;}
  .print-hoja-etiq .etiq{border:.5pt solid #999;}
  @page{size:letter;margin:1cm;}
}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lcard">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#1a73e8,#0d47a1);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 6px 20px rgba(26,115,232,.45);">
        <span style="color:#fff;font-size:30px;">🖥</span>
      </div>
      <div style="font-size:22px;font-weight:700;color:#1c1e21;">InventarioTech</div>
      <div style="font-size:12px;color:#9aa0a6;margin-top:4px;font-weight:500;">APP CAFIVER · Gestión de equipos</div>
    </div>
    <div id="login-error" style="display:none;background:#fce8e6;color:#c0392b;border-radius:10px;padding:10px 14px;font-size:12px;margin-bottom:16px;line-height:1.5;"></div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="font-size:10px;font-weight:700;color:#9aa0a6;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px;">Correo electrónico</label>
        <input class="fi" type="email" id="login-email" placeholder="correo@cafiver.com.mx" autocomplete="email">
      </div>
      <div>
        <label style="font-size:10px;font-weight:700;color:#9aa0a6;letter-spacing:.05em;text-transform:uppercase;display:block;margin-bottom:5px;">Contraseña</label>
        <div style="position:relative;">
          <input class="fi" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px;letter-spacing:2px;">
          <button id="toggle-pass-btn" type="button" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9aa0a6;font-size:18px;line-height:1;padding:4px;">👁</button>
        </div>
      </div>
      <button id="login-btn" type="button" style="background:linear-gradient(135deg,#1a73e8,#1557b0);color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;width:100%;box-shadow:0 4px 12px rgba(26,115,232,.4);">
        Iniciar sesión
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo-mark">🖥</div>
      <div><div class="proj-name">APP CAFIVER</div><div class="proj-sub">Inventario de equipos</div></div>
    </div>
    <button class="tnav on" id="tnav-dashboard"    onclick="switchView('dashboard')"><span class='tnav-icon'>📊</span><span class='tnav-txt'> Dashboard</span></button>
    <button class="tnav"    id="tnav-inventario"   onclick="switchView('inventario')"><span class='tnav-icon'>🗃</span><span class='tnav-txt'> Inventario</span></button>
    <button class="tnav"    id="tnav-qr"           onclick="switchView('qr')"><span class='tnav-icon'>⬛</span><span class='tnav-txt'> QR</span></button>
    <button class="tnav"    id="tnav-reparaciones" onclick="switchView('reparaciones')"><span class='tnav-icon'>🔧</span><span class='tnav-txt'> Reparaciones</span></button>
    <div class="topbar-right">
      <div class="sync-pill ok" id="topbar-sync">
        <span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;"></span>
        <span id="topbar-sync-txt">En línea</span>
      </div>
      <div class="user-pill" onclick="openChPass()" title="Cambiar contraseña">
        <div class="cu-av" id="cur-av"></div>
        <span id="cur-nm"></span>
        <span style="font-size:10px;color:#9aa0a6;">🔐</span>
      </div>
      <button class="btn btn-blue btn-sm" onclick="openFormEquipo()">+ Equipo</button>
      <button class="btn btn-sm" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div id="view-dashboard"    class="view-wrap hidden"></div>
  <div id="view-inventario"   class="view-wrap hidden"></div>
  <div id="view-qr"           class="hidden" style="flex:1;overflow:auto;background:#eef2f7;"></div>
  <div id="view-reparaciones" class="view-wrap hidden"></div>
  <div id="view-etiquetas" class="hidden" style="flex:1;overflow:auto;background:#e8eaed;"></div>
</div>

<!-- DETAIL PANEL -->
<div id="dp-overlay" onclick="closePanel()"></div>
<div id="dp">
  <div class="dp-hd">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
      <div>
        <div id="dp-title" style="font-size:15px;font-weight:700;margin-bottom:4px;color:#1c1e21;"></div>
        <div id="dp-sub" style="font-size:12px;color:#9aa0a6;display:flex;align-items:center;gap:6px;flex-wrap:wrap;"></div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0;">
        <button class="icon-btn" onclick="editFromPanel()" title="Editar">✏️</button>
        <button class="icon-btn" onclick="printFicha()" title="Imprimir ficha">🖨</button>
        <button class="icon-btn" onclick="printEtiqueta(openEquipoId)" title="Imprimir etiqueta">🏷</button>
        <button class="icon-btn" onclick="deleteFromPanel()" title="Eliminar" style="color:#ea4335;">🗑</button>
        <button class="icon-btn" onclick="closePanel()">✕</button>
      </div>
    </div>
  </div>
  <div class="dp-tabs">
    <button class="dp-tab on" id="dpt-info"      onclick="dpTab('info')">Información</button>
    <button class="dp-tab"    id="dpt-red"       onclick="dpTab('red')">Red</button>
    <button class="dp-tab"    id="dpt-compra"    onclick="dpTab('compra')">Compra</button>
    <button class="dp-tab"    id="dpt-historial"    onclick="dpTab('historial')">Historial</button>
    <button class="dp-tab"    id="dpt-asignaciones" onclick="dpTab('asignaciones')">👤 Asignaciones</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<!-- FICHA IMPRIMIBLE (solo visible al imprimir) -->
<div class="ficha-qr" id="ficha-print"></div>

<!-- FORM EQUIPO -->
<div id="overlay-form" class="hidden" onclick="if(event.target===this)closeFormEquipo()">
  <div class="modal-card wide">
    <div class="modal-hd">
      <h3 id="form-modal-title">Nuevo equipo</h3>
      <button class="icon-btn" onclick="closeFormEquipo()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-section">Identificación general</div>
      <div class="af-g3">
        <div class="af"><label>Área *</label><input type="text" id="f-area" placeholder="Ej. Comercializadora Nacional"></div>
        <div class="af"><label>Plaza *</label><input type="text" id="f-plaza" placeholder="Ej. Ixtaczoquitlán"></div>
        <div class="af"><label>Nombre del equipo</label><input type="text" id="f-nombre" placeholder="Ej. ResidenteAS"></div>
      </div>
      <div class="af-g3">
        <div class="af"><label>Ubicación</label><input type="text" id="f-ubicacion" placeholder="Ej. Autoservicio"></div>
        <div class="af"><label>Usuario de red</label><input type="text" id="f-usuario" placeholder="Ej. residenteanaquel"></div>
        <div class="af"><label>Responsable</label><input type="text" id="f-responsable" placeholder="Nombre del responsable"></div>
      </div>
      <div class="af-g3">
        <div class="af"><label>Puesto</label><input type="text" id="f-puesto" placeholder="Ej. Jefe de área"></div>
        <div class="af"><label>Departamento</label><input type="text" id="f-depto" placeholder="Ej. TI"></div>
        <div class="af"><label>Estado físico</label>
          <select id="f-estado"><option>Bueno</option><option>Regular</option><option>Malo</option><option>Baja</option></select>
        </div>
      </div>
      <div class="form-section">Hardware</div>
      <div class="af-g3">
        <div class="af"><label>Tipo *</label>
          <select id="f-tipo"><option>Desktop</option><option>Laptop</option><option>Servidor</option><option>Impresora</option><option>Otro</option></select>
        </div>
        <div class="af"><label>Marca *</label><input type="text" id="f-marca" placeholder="Ej. DELL"></div>
        <div class="af"><label>Modelo *</label><input type="text" id="f-modelo" placeholder="Ej. Vostro 230"></div>
      </div>
      <div class="af-g3">
        <div class="af"><label>Número de serie</label><input type="text" id="f-serie" placeholder="Serie del equipo"></div>
        <div class="af"><label>Procesador</label><input type="text" id="f-cpu" placeholder="Ej. Dual Core E5400"></div>
        <div class="af"><label>RAM</label><input type="text" id="f-ram" placeholder="Ej. 4GB"></div>
      </div>
      <div class="form-section">Almacenamiento</div>
      <div class="af-g2">
        <div class="af"><label>HDD — Marca</label><input type="text" id="f-hdd-marca" placeholder="Marca del HDD"></div>
        <div class="af"><label>HDD — N° de serie</label><input type="text" id="f-hdd-serie" placeholder="Serie del HDD"></div>
      </div>
      <div class="af-g2">
        <div class="af"><label>SSD — Marca</label><input type="text" id="f-ssd-marca" placeholder="Marca del SSD"></div>
        <div class="af"><label>SSD — N° de serie</label><input type="text" id="f-ssd-serie" placeholder="Serie del SSD"></div>
      </div>
      <div class="form-section">Red</div>
      <div class="af-g3">
        <div class="af"><label>Dirección IP</label><input type="text" id="f-ip" placeholder="192.168.1.100"></div>
        <div class="af"><label>MAC Ethernet</label><input type="text" id="f-mac-eth" placeholder="00-26-2D-24-FD-B9"></div>
        <div class="af"><label>MAC WiFi</label><input type="text" id="f-mac-wifi" placeholder="80-3F-5D-18-37-94"></div>
      </div>
      <div class="form-section">Software y accesos</div>
      <div class="af-g3">
        <div class="af"><label>Sistema Operativo</label><input type="text" id="f-so" placeholder="Windows 10 Pro"></div>
        <div class="af"><label>Licencia Windows</label><input type="text" id="f-lic-win" placeholder="Clave de licencia"></div>
        <div class="af"><label>Password red</label><input type="password" id="f-pass" placeholder="Contraseña de red"></div>
      </div>
      <div class="af-g2">
        <div class="af"><label>Password VPN</label><input type="password" id="f-pass-vpn" placeholder="Contraseña VPN"></div>
        <div class="af"><label>AF (Activo Fijo)</label><input type="text" id="f-af" placeholder="N° de activo fijo"></div>
      </div>
      <div class="form-section">Compra y garantía</div>
      <div class="af-g3">
        <div class="af"><label>Fecha de compra</label><input type="date" id="f-fecha"></div>
        <div class="af"><label>Garantía</label><input type="text" id="f-garantia" placeholder="Ej. 1 año, vencida"></div>
        <div class="af"><label>Proveedor</label><input type="text" id="f-proveedor" placeholder="Nombre del proveedor"></div>
      </div>
      <div class="af-g3">
        <div class="af"><label>Precio ($)</label><input type="number" id="f-precio" placeholder="0.00" step="0.01"></div>
        <div class="af"><label>Factura</label><input type="text" id="f-factura" placeholder="Folio o 'No hay datos'"></div>
      </div>
      <div class="form-section">Observaciones</div>
      <div class="af"><textarea id="f-obs" placeholder="Notas, condiciones especiales, daños visibles..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeFormEquipo()">Cancelar</button>
      <button class="btn btn-blue" onclick="saveEquipo()">💾 Guardar equipo</button>
    </div>
  </div>
</div>


<!-- MODAL TRANSFERENCIA -->
<div id="overlay-transfer" style="display:none;" class="transfer-modal" onclick="if(event.target===this)closeTransfer()">
  <div class="transfer-card">
    <div class="modal-hd">
      <h3>🔄 Transferir equipo</h3>
      <button class="icon-btn" onclick="closeTransfer()">✕</button>
    </div>
    <div class="modal-body">
      <div id="transfer-eq-info" style="background:#f0f2f5;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;"></div>
      <div class="af-g2">
        <div class="af"><label>Nuevo responsable *</label><input type="text" id="tr-responsable" placeholder="Nombre completo"></div>
        <div class="af"><label>Puesto</label><input type="text" id="tr-puesto" placeholder="Ej. Supervisor"></div>
      </div>
      <div class="af-g2">
        <div class="af"><label>Departamento</label><input type="text" id="tr-depto" placeholder="Ej. Producción"></div>
        <div class="af"><label>Fecha de transferencia</label><input type="date" id="tr-fecha"></div>
      </div>
      <div class="af"><label>Motivo del cambio</label>
        <select id="tr-motivo" style="width:100%;font-size:12px;padding:7px 10px;border:1.5px solid #e0e2e6;border-radius:8px;outline:none;">
          <option value="Reasignación">Reasignación</option>
          <option value="Reparación / Mantenimiento">Reparación / Mantenimiento</option>
          <option value="Baja temporal">Baja temporal</option>
          <option value="Reutilización">Reutilización</option>
          <option value="Otro">Otro</option>
        </select>
      </div>
      <div class="af"><label>Notas</label><textarea id="tr-notas" placeholder="Observaciones del cambio..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeTransfer()">Cancelar</button>
      <button class="btn btn-blue" onclick="saveTransfer()">✅ Transferir</button>
    </div>
  </div>
</div>

<!-- FORM REPARACIÓN -->
<div id="overlay-rep" style="display:none;position:fixed;inset:0;background:rgba(15,20,35,.5);align-items:center;justify-content:center;z-index:400;backdrop-filter:blur(2px);" onclick="if(event.target===this)closeFormRep()">
  <div class="modal-card" style="max-width:560px;margin:auto;">
    <div class="modal-hd">
      <h3 id="rep-modal-title">Nueva reparación</h3>
      <button class="icon-btn" onclick="closeFormRep()">✕</button>
    </div>
    <div class="modal-body">
      <div class="af"><label>Equipo *</label>
        <select id="rep-equipo-sel" style="width:100%;font-size:12px;padding:7px 10px;border:1.5px solid #e0e2e6;border-radius:8px;outline:none;"></select>
      </div>
      <div class="af-g2">
        <div class="af"><label>Fecha *</label><input type="date" id="rep-fecha"></div>
        <div class="af"><label>Técnico</label><input type="text" id="rep-tecnico" placeholder="Nombre del técnico"></div>
      </div>
      <div class="af-g2">
        <div class="af"><label>Tipo de falla</label><input type="text" id="rep-falla" placeholder="Ej. No enciende, pantalla rota..."></div>
        <div class="af"><label>Costo ($)</label><input type="number" id="rep-costo" placeholder="0.00" step="0.01"></div>
      </div>
      <div class="af"><label>Estado resultante</label>
        <select id="rep-estado" style="width:100%;font-size:12px;padding:7px 10px;border:1.5px solid #e0e2e6;border-radius:8px;outline:none;">
          <option>Bueno</option><option>Regular</option><option>Malo</option><option>Baja</option>
        </select>
      </div>
      <div class="af"><label>Trabajo realizado</label>
        <textarea id="rep-desc" placeholder="Detalla qué se reparó, qué piezas se cambiaron..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeFormRep()">Cancelar</button>
      <button class="btn btn-blue" onclick="saveReparacion()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- CHANGE PASSWORD -->
<div id="chpass-overlay" class="hidden" onclick="if(event.target===this)closeChPass()">
  <div class="confirm-card">
    <h3>🔐 Cambiar contraseña</h3>
    <div id="chpass-error" style="display:none;background:#fce8e6;color:#c0392b;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:10px;"></div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div>
        <label style="font-size:10px;font-weight:700;color:#9aa0a6;text-transform:uppercase;display:block;margin-bottom:4px;">Nueva contraseña</label>
        <input type="password" id="chpass-new" placeholder="Mínimo 6 caracteres..." style="width:100%;font-size:13px;padding:8px 10px;border:1.5px solid #e0e2e6;border-radius:8px;outline:none;">
      </div>
      <div>
        <label style="font-size:10px;font-weight:700;color:#9aa0a6;text-transform:uppercase;display:block;margin-bottom:4px;">Confirmar contraseña</label>
        <input type="password" id="chpass-confirm" placeholder="Repite la contraseña..." style="width:100%;font-size:13px;padding:8px 10px;border:1.5px solid #e0e2e6;border-radius:8px;outline:none;">
      </div>
    </div>
    <div class="confirm-btns" style="margin-top:14px;">
      <button class="btn" onclick="closeChPass()">Cancelar</button>
      <button class="btn btn-blue" onclick="doChPass()">Cambiar</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div id="confirm-overlay" class="hidden">
  <div class="confirm-card">
    <h3 id="confirm-title">¿Confirmar?</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-red" id="confirm-ok">Eliminar</button>
    </div>
  </div>
</div>

var BASE_URL='https://robertoamayar.github.io/inventario-cafiver/#';
var curUser=null,curView='dashboard',openEquipoId=null,editingId=null,dpCurTab='info';
var sortCol='',sortAsc=true;
var invFilter={q:'',tipo:'',estado:'',plaza:'',area:''};

function uid(){return 'EQ'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase();}
function ini(n){return (n||'?').split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}
function nowStr(){return new Date().toLocaleString('es-MX',{dateStyle:'short',timeStyle:'short'});}
function setSyncUI(s,m){var p=document.getElementById('topbar-sync'),t=document.getElementById('topbar-sync-txt');if(p)p.className='sync-pill '+s;if(t)t.textContent=m;}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},3000);}
function fmt$(n){return n?'$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2}):'—';}
function cleanObj(o){return JSON.parse(JSON.stringify(o,function(k,v){return v===undefined?null:v;}));}
function tipoPill(t){var m={Desktop:'pill-desktop',Laptop:'pill-laptop',Servidor:'pill-servidor',Impresora:'pill-impresora',Otro:'pill-otro'};return '<span class="pill '+(m[t]||'pill-otro')+'">'+t+'</span>';}
function estadoPill(e){var m={Bueno:'pill-bueno',Regular:'pill-regular',Malo:'pill-malo',Baja:'pill-baja'};return '<span class="pill '+(m[e]||'pill-otro')+'">'+e+'</span>';}
function row(k,v){return '<div class="dp-row"><div class="dp-key">'+k+'</div><div class="dp-val">'+(v||'—')+'</div></div>';}

// LOGIN
document.getElementById('login-btn').addEventListener('click',doLogin);
document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('login-email').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('toggle-pass-btn').addEventListener('click',function(){var i=document.getElementById('login-pass');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈';});
function showLoginError(m){var el=document.getElementById('login-error');el.textContent=m;el.style.display='block';}
function doLogin(){
  var email=(document.getElementById('login-email').value||'').trim().toLowerCase();
  var pass=(document.getElementById('login-pass').value||'').trim();
  var btn=document.getElementById('login-btn');
  document.getElementById('login-error').style.display='none';
  if(!email){showLoginError('Escribe tu correo.');return;}
  if(!pass){showLoginError('Escribe tu contraseña.');return;}
  btn.textContent='Entrando...';btn.disabled=true;btn.style.opacity='.7';
  auth.signInWithEmailAndPassword(email,pass)
    .then(function(c){
      var p=USER_DIR[email]||{name:email.split('@')[0],color:'#1a73e8'};
      curUser={uid:c.user.uid,email:email,name:p.name,color:p.color};
      enterApp();
    })
    .catch(function(e){
      btn.textContent='Iniciar sesión';btn.disabled=false;btn.style.opacity='1';
      var m='Correo o contraseña incorrectos.';
      if(e.code==='auth/user-not-found')m='Usuario no encontrado.';
      if(e.code==='auth/wrong-password')m='Contraseña incorrecta.';
      if(e.code==='auth/invalid-credential')m='Correo o contraseña incorrectos.';
      if(e.code==='auth/invalid-email')m='Formato de correo inválido.';
      if(e.code==='auth/too-many-requests')m='Demasiados intentos. Espera unos minutos.';
      if(e.code==='auth/network-request-failed')m='Sin conexión a internet.';
      showLoginError(m);
    });
}
function enterApp(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.body.classList.add('app-mode');
  var av=document.getElementById('cur-av');
  av.textContent=ini(curUser.name);av.style.background=curUser.color+'22';av.style.color=curUser.color;
  document.getElementById('cur-nm').textContent=curUser.name;
  document.getElementById('login-btn').textContent='Iniciar sesión';
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn').style.opacity='1';
  loadAppData();
}
function doLogout(){
  auth.signOut().then(function(){
    curUser=null;equipos=[];reparaciones=[];closePanel();
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
    document.body.classList.remove('app-mode');
    document.getElementById('login-email').value='';
    document.getElementById('login-pass').value='';
    document.getElementById('login-error').style.display='none';
  });
}

// LOAD DATA
function loadAppData(){
  setSyncUI('saving','Cargando...');
  db.collection('equipos').onSnapshot(function(s){
    equipos=s.docs.map(function(d){return d.data();});
    if(curView==='dashboard')renderDashboard();
    if(curView==='inventario')renderInventario();
    if(curView==='qr')renderQR();
    setSyncUI('ok','En línea ✓');
  },function(){setSyncUI('error','Error');});
  // Real-time transferencias
  db.collection('transferencias').onSnapshot(function(s){
    transferencias=s.docs.map(function(d){return d.data();});
    if(openEquipoId) dpTab(dpCurTab);
  }, function(err){ console.warn('transferencias:', err.message); });
  db.collection('reparaciones').onSnapshot(function(s){
    reparaciones=s.docs.map(function(d){return d.data();});
    if(curView==='reparaciones')renderReparaciones();
  });
  switchView('dashboard');checkQRHash();
}
function fbSave(e){
  setSyncUI('saving','Guardando...');
  db.collection('equipos').doc(e.id).set(cleanObj(e))
    .then(function(){setSyncUI('ok','En línea ✓');})
    .catch(function(e){setSyncUI('error','Error');toast('⚠️ '+e.message);});
}

// VIEW SWITCH
function switchView(v){
  curView=v;
  ['dashboard','inventario','qr','reparaciones','etiquetas'].forEach(function(x){
    document.getElementById('view-'+x).classList.toggle('hidden',x!==v);
    var b=document.getElementById('tnav-'+x);if(b)b.classList.toggle('on',x===v);
  });
  if(v==='dashboard')renderDashboard();
  if(v==='inventario')renderInventario();
  if(v==='qr')renderQR();
  if(v==='reparaciones')renderReparaciones();
  if(v==='etiquetas')renderEtiquetas();
}

// DASHBOARD
function renderDashboard(){
  var w=document.getElementById('view-dashboard');if(!w)return;
  var total=equipos.length;
  var byTipo={Desktop:0,Laptop:0,Servidor:0,Impresora:0,Otro:0};
  var byEstado={Bueno:0,Regular:0,Malo:0,Baja:0};
  var totalInv=0;
  equipos.forEach(function(e){byTipo[e.tipo]=(byTipo[e.tipo]||0)+1;byEstado[e.estado]=(byEstado[e.estado]||0)+1;totalInv+=parseFloat(e.precio)||0;});
  // Areas breakdown
  var areas={};
  equipos.forEach(function(e){areas[e.area]=(areas[e.area]||0)+1;});
  var areaRows=Object.keys(areas).sort().map(function(a){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f0f2f5;">'
      +'<span style="font-size:12px;">'+a+'</span>'
      +'<span style="font-size:12px;font-weight:600;color:#1a73e8;">'+areas[a]+' equipo'+(areas[a]!==1?'s':'')+'</span>'
      +'</div>';
  }).join('');
  w.innerHTML=
    '<div class="dash-title">Dashboard — Inventario de equipos</div>'
    +'<div class="dash-sub">'+new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'</div>'
    +'<div class="stats-grid">'
    +'<div class="stat-card"><div class="lbl">Total equipos</div><div class="val blue">'+total+'</div><div class="trend">activos en inventario</div></div>'
    +'<div class="stat-card"><div class="lbl">Buen estado</div><div class="val green">'+(byEstado.Bueno||0)+'</div><div class="trend">'+Math.round(((byEstado.Bueno||0)/Math.max(total,1))*100)+'% del total</div></div>'
    +'<div class="stat-card"><div class="lbl">Regular</div><div class="val amber">'+(byEstado.Regular||0)+'</div><div class="trend">requieren atención</div></div>'
    +'<div class="stat-card"><div class="lbl">Malo / Baja</div><div class="val red">'+((byEstado.Malo||0)+(byEstado.Baja||0))+'</div><div class="trend">para reemplazo</div></div>'
    +'<div class="stat-card"><div class="lbl">Desktops</div><div class="val">'+(byTipo.Desktop||0)+'</div></div>'
    +'<div class="stat-card"><div class="lbl">Laptops</div><div class="val">'+(byTipo.Laptop||0)+'</div></div>'
    +'<div class="stat-card"><div class="lbl">Servidores</div><div class="val">'+(byTipo.Servidor||0)+'</div></div>'
    +'<div class="stat-card"><div class="lbl">Reparaciones</div><div class="val">'+reparaciones.length+'</div></div>'
    +(function(){
      var r=0,a=0,v=0,s=0;
      equipos.forEach(function(e){
        var cls=vidaClass(calcAnios(e.fecha));
        if(cls==='rojo')r++;else if(cls==='amarillo')a++;else if(cls==='verde')v++;else s++;
      });
      return '<div class="stat-card"><div class="lbl">🔴 Para cambio</div><div class="val red">'+r+'</div><div class="trend">+4 años</div></div>'
        +'<div class="stat-card"><div class="lbl">🟡 Próximos</div><div class="val amber">'+a+'</div><div class="trend">3-4 años</div></div>'
        +'<div class="stat-card"><div class="lbl">🟢 En buen tiempo</div><div class="val green">'+v+'</div><div class="trend">menos de 3 años</div></div>';
    })()
    +'<div class="stat-card"><div class="lbl">Valor inventario</div><div class="val blue" style="font-size:17px;">'+fmt$(totalInv)+'</div></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">'
    +'<div class="tbl-box"><div class="tbl-hdr"><span class="tbl-hdr-title">📍 Equipos por área</span></div><div style="padding:8px 16px;">'+areaRows+'</div></div>'
    +'<div class="tbl-box"><div class="tbl-hdr"><span class="tbl-hdr-title">🕐 Últimos registros</span></div>'

// INVENTARIO
function renderInventario(){
  var w=document.getElementById('view-inventario');if(!w)return;
  var data=equipos.filter(function(e){
    var q=invFilter.q.toLowerCase();
    if(q&&!(e.nombre+e.modelo+e.marca+e.plaza+e.area+e.serie+e.ip+e.so+e.usuario+e.responsable).toLowerCase().includes(q))return false;
    if(invFilter.tipo&&e.tipo!==invFilter.tipo)return false;
    if(invFilter.estado&&e.estado!==invFilter.estado)return false;
    if(invFilter.plaza&&e.plaza!==invFilter.plaza)return false;
    if(invFilter.area&&e.area!==invFilter.area)return false;
    return true;
  });
  if(sortCol){data.sort(function(a,b){var av=a[sortCol]||'',bv=b[sortCol]||'';return sortAsc?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);});}
  var plazas=[],areas=[];
  equipos.forEach(function(e){
    if(plazas.indexOf(e.plaza)<0&&e.plaza)plazas.push(e.plaza);
    if(areas.indexOf(e.area)<0&&e.area)areas.push(e.area);
  });
  plazas.sort();areas.sort();
  w.innerHTML=
    '<div class="tbl-box">'
    +'<div class="tbl-hdr">'
    +'<span class="tbl-hdr-title">'+data.length+' equipo'+(data.length!==1?'s':'')+'</span>'
    +'<div class="tbl-tools">'
    +'<input class="fi-sm" type="text" placeholder="🔍 Buscar..." value="'+invFilter.q+'" oninput="invFilter.q=this.value;renderInventario()" style="width:190px;">'
    +'<select class="fi-sm" onchange="invFilter.area=this.value;renderInventario()">'
    +'<option value="">Todas las áreas</option>'
    +areas.map(function(a){return '<option value="'+a+'"'+(invFilter.area===a?' selected':'')+'>'+a+'</option>';}).join('')
    +'</select>'
    +'<select class="fi-sm" onchange="invFilter.plaza=this.value;renderInventario()">'
    +'<option value="">Todas las plazas</option>'
    +plazas.map(function(p){return '<option value="'+p+'"'+(invFilter.plaza===p?' selected':'')+'>'+p+'</option>';}).join('')
    +'</select>'
    +'<select class="fi-sm" onchange="invFilter.tipo=this.value;renderInventario()">'
    +'<option value="">Todos los tipos</option>'
    +['Desktop','Laptop','Servidor','Impresora','Otro'].map(function(t){return '<option value="'+t+'"'+(invFilter.tipo===t?' selected':'')+'>'+t+'</option>';}).join('')
    +'</select>'
    +'<select class="fi-sm" onchange="invFilter.estado=this.value;renderInventario()">'
    +'<option value="">Todos los estados</option>'
    +['Bueno','Regular','Malo','Baja'].map(function(t){return '<option value="'+t+'"'+(invFilter.estado===t?' selected':'')+'>'+t+'</option>';}).join('')
    +'</select>'
    +'<button class="btn btn-blue btn-sm" onclick="openFormEquipo()">+ Nuevo</button>'
    +'</div></div>'
    +'<div style="overflow-x:auto;"><table>'
    +'<thead><tr>'
    +['id','tipo','area','plaza','marca','nombre','responsable','cpu','ram','ip','so','estado',''].map(function(c,i){
      var lbl=['ID','Tipo','Área','Plaza','Marca/Modelo','Nombre equipo','Responsable','Procesador','RAM','IP','S.O.','Estado','Acciones'][i];
      if(!c)return '<th>'+lbl+'</th>';
      return '<th onclick="sortBy(\''+c+'\')" >'+lbl+(sortCol===c?(sortAsc?' ▲':' ▼'):' ⇅')+'</th>';
    }).join('')
    +'</tr></thead><tbody>'
    +(data.length?data.map(function(e){
      var rc=rowClass(e.fecha);
      return '<tr class="'+rc+'" style="cursor:pointer;" ondblclick="openPanel(\''+e.id+'\')">'
        +'<td style="font-family:monospace;font-size:10px;color:#9aa0a6;">'+e.id+'</td>'
        +'<td>'+tipoPill(e.tipo)+'</td>'
        +'<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;">'+e.area+'</td>'
        +'<td style="white-space:nowrap;font-size:11px;">'+e.plaza+'</td>'
        +'<td><b style="font-weight:600;">'+e.marca+'</b> <span style="color:#9aa0a6;">'+e.modelo+'</span></td>'
        +'<td>'+(e.nombre||'—')+'</td>'
        +'<td style="font-size:11px;color:#9aa0a6;">'+(e.responsable||'—')+'</td>'
        +'<td style="font-size:11px;">'+(e.cpu||'—')+'</td>'
        +'<td style="font-size:11px;">'+(e.ram||'—')+'</td>'
        +'<td style="font-family:monospace;font-size:11px;">'+(e.ip||'—')+'</td>'
        +'<td style="font-size:11px;">'+(e.so||'—')+'</td>'
        +'<td>'+estadoPill(e.estado)+'</td>'
        +'<td>'+vidaPill(e.fecha)+'</td>'
        +'<td><div style="display:flex;gap:3px;">'
        +'<button class="icon-btn" title="Ver" onclick="event.stopPropagation();openPanel(\''+e.id+'\')">👁</button>'
        +'<button class="icon-btn" title="Editar" onclick="event.stopPropagation();editEquipo(\''+e.id+'\')">✏️</button>'
        +'<button class="icon-btn" title="Reparación" onclick="event.stopPropagation();openFormRepFor(\''+e.id+'\')">🔧</button>'
        +'<button class="icon-btn" title="Imprimir ficha" onclick="event.stopPropagation();printFichaId(\''+e.id+'\')">🖨</button>'
        +'<button class="icon-btn" title="Imprimir etiqueta" onclick="event.stopPropagation();printEtiqueta(\''+e.id+'\')">🏷</button>'
        +'<button class="icon-btn" title="Transferir" onclick="event.stopPropagation();openTransfer(\''+e.id+'\')">🔄</button>'
        +'<button class="icon-btn" title="Eliminar" onclick="event.stopPropagation();deleteEquipo(\''+e.id+'\')" style="color:#ea4335;">🗑</button>'
        +'</div></td>'
        +'</tr>';
    }).join(''):'<tr><td colspan="13" class="empty-state">No hay equipos que coincidan</td></tr>')
    +'</tbody></table></div></div>'
    ;
  if(isMobile()){
    // En móvil reemplazar tabla por cards
    w.querySelector('.tbl-box').innerHTML=
      '<div class="tbl-hdr">'
      +'<span class="tbl-hdr-title">'+data.length+' equipo'+(data.length!==1?'s':'')+'</span>'
      +'<button class="btn btn-blue btn-sm" onclick="openFormEquipo()">+ Nuevo</button>'
      +'</div>'
      +'<div style="padding:6px 12px 2px;">'
      +'<input class="fi-sm" type="text" placeholder="🔍 Buscar..." value="'+invFilter.q+'" oninput="invFilter.q=this.value;renderInventario()" style="width:100%;margin-bottom:6px;">'
      +'<div style="display:flex;gap:6px;margin-bottom:8px;">'
      +'<select class="fi-sm" style="flex:1;" onchange="invFilter.area=this.value;renderInventario()">'
      +'<option value="">Todas las áreas</option>'
      +areas.map(function(a){return '<option value="'+a+'"'+(invFilter.area===a?' selected':'')+'>'+a+'</option>';}).join('')
      +'</select>'
      +'<select class="fi-sm" style="flex:1;" onchange="invFilter.estado=this.value;renderInventario()">'
      +'<option value="">Todos los estados</option>'
      +['Bueno','Regular','Malo','Baja'].map(function(t){return '<option value="'+t+'"'+(invFilter.estado===t?' selected':'')+'>'+t+'</option>';}).join('')
      +'</select>'
      +'</div></div>'
      +'<div style="padding:0 12px 12px;">'
      +renderInventarioCards(data)
      +'</div>';
  }
}
function sortBy(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}renderInventario();}

// FORM EQUIPO
function openFormEquipo(){editingId=null;document.getElementById('form-modal-title').textContent='Nuevo equipo';clearForm();document.getElementById('overlay-form').classList.remove('hidden');}
function editEquipo(id){var e=equipos.find(function(x){return x.id===id;});if(!e)return;editingId=id;document.getElementById('form-modal-title').textContent='Editar: '+(e.nombre||e.modelo);fillForm(e);document.getElementById('overlay-form').classList.remove('hidden');}
function closeFormEquipo(){document.getElementById('overlay-form').classList.add('hidden');editingId=null;}
function clearForm(){
  ['area','plaza','nombre','ubicacion','usuario','responsable','puesto','depto','marca','modelo','serie','cpu','ram','hdd-marca','hdd-serie','ssd-marca','ssd-serie','ip','mac-eth','mac-wifi','so','lic-win','pass','pass-vpn','af','fecha','garantia','proveedor','factura','obs'].forEach(function(id){var el=document.getElementById('f-'+id);if(el)el.value='';});
  document.getElementById('f-tipo').value='Desktop';
  document.getElementById('f-estado').value='Bueno';
  document.getElementById('f-precio').value='';
}
function fillForm(e){
  var m={'area':e.area,'plaza':e.plaza,'nombre':e.nombre,'ubicacion':e.ubicacion,'usuario':e.usuario,'responsable':e.responsable,'puesto':e.puesto,'depto':e.depto,'marca':e.marca,'modelo':e.modelo,'serie':e.serie,'cpu':e.cpu,'ram':e.ram,'hdd-marca':e.hdd_marca,'hdd-serie':e.hdd_serie,'ssd-marca':e.ssd_marca,'ssd-serie':e.ssd_serie,'ip':e.ip,'mac-eth':e.mac_eth,'mac-wifi':e.mac_wifi,'so':e.so,'lic-win':e.lic_win,'pass':e.pass,'pass-vpn':e.pass_vpn,'af':e.af,'fecha':e.fecha,'garantia':e.garantia,'proveedor':e.proveedor,'factura':e.factura,'obs':e.obs};
  Object.keys(m).forEach(function(k){var el=document.getElementById('f-'+k);if(el)el.value=m[k]||'';});
  document.getElementById('f-tipo').value=e.tipo||'Desktop';
  document.getElementById('f-estado').value=e.estado||'Bueno';
  document.getElementById('f-precio').value=e.precio||'';
}
function getFormValues(){
  return {id:editingId||uid(),area:document.getElementById('f-area').value.trim(),plaza:document.getElementById('f-plaza').value.trim(),tipo:document.getElementById('f-tipo').value,marca:document.getElementById('f-marca').value.trim(),modelo:document.getElementById('f-modelo').value.trim(),nombre:document.getElementById('f-nombre').value.trim(),ubicacion:document.getElementById('f-ubicacion').value.trim(),usuario:document.getElementById('f-usuario').value.trim(),responsable:document.getElementById('f-responsable').value.trim(),puesto:document.getElementById('f-puesto').value.trim(),depto:document.getElementById('f-depto').value.trim(),serie:document.getElementById('f-serie').value.trim(),cpu:document.getElementById('f-cpu').value.trim(),ram:document.getElementById('f-ram').value.trim(),hdd_marca:document.getElementById('f-hdd-marca').value.trim(),hdd_serie:document.getElementById('f-hdd-serie').value.trim(),ssd_marca:document.getElementById('f-ssd-marca').value.trim(),ssd_serie:document.getElementById('f-ssd-serie').value.trim(),ip:document.getElementById('f-ip').value.trim(),mac_eth:document.getElementById('f-mac-eth').value.trim(),mac_wifi:document.getElementById('f-mac-wifi').value.trim(),so:document.getElementById('f-so').value.trim(),lic_win:document.getElementById('f-lic-win').value.trim(),pass:document.getElementById('f-pass').value.trim(),pass_vpn:document.getElementById('f-pass-vpn').value.trim(),af:document.getElementById('f-af').value.trim(),fecha:document.getElementById('f-fecha').value,garantia:document.getElementById('f-garantia').value.trim(),proveedor:document.getElementById('f-proveedor').value.trim(),precio:parseFloat(document.getElementById('f-precio').value)||0,factura:document.getElementById('f-factura').value.trim(),estado:document.getElementById('f-estado').value,obs:document.getElementById('f-obs').value.trim(),updBy:curUser?curUser.name:'',updTs:nowStr()};
}
function saveEquipo(){var e=getFormValues();if(!e.area||!e.marca||!e.modelo){alert('Área, Marca y Modelo son obligatorios.');return;}fbSave(e);closeFormEquipo();toast(editingId?'✅ Equipo actualizado':'✅ Equipo guardado');}
function deleteEquipo(id){var e=equipos.find(function(x){return x.id===id;});if(!e)return;confirmAction('¿Eliminar equipo?',e.marca+' '+e.modelo+' ('+e.id+')',function(){db.collection('equipos').doc(id).delete().then(function(){closePanel();toast('Equipo eliminado');});});}

// DETAIL PANEL
function openPanel(id){
  var e=equipos.find(function(x){return x.id===id;});if(!e)return;
  openEquipoId=id;
  document.getElementById('dp-title').textContent=(e.nombre||e.modelo)+' — '+e.marca;
  document.getElementById('dp-sub').innerHTML=tipoPill(e.tipo)+'&nbsp;'+estadoPill(e.estado)+'&nbsp;<span style="font-size:11px;color:#9aa0a6;font-family:monospace;">'+e.id+'</span>';
  dpTab(dpCurTab);
  document.getElementById('dp').classList.add('open');
  document.getElementById('dp-overlay').classList.add('on');
}
function closePanel(){document.getElementById('dp').classList.remove('open');document.getElementById('dp-overlay').classList.remove('on');openEquipoId=null;}
function editFromPanel(){var id=openEquipoId;closePanel();editEquipo(id);}
function deleteFromPanel(){deleteEquipo(openEquipoId);}

function dpTab(tab){
  dpCurTab=tab;
  ['info','red','compra','historial','asignaciones'].forEach(function(x){var el=document.getElementById('dpt-'+x);if(el)el.classList.toggle('on',x===tab);});
  var e=equipos.find(function(x){return x.id===openEquipoId;});if(!e)return;
  var body=document.getElementById('dp-body');
  var reps=reparaciones.filter(function(r){return r.equipo_id===openEquipoId;});
  if(tab==='info'){
    body.innerHTML=
      '<div class="dp-sec-t">Identificación</div>'
      +row('Área',e.area)+row('Plaza',e.plaza)+row('Ubicación',e.ubicacion)
      +row('Nombre equipo',e.nombre)+row('Responsable',e.responsable)
      +row('Puesto',e.puesto)+row('Departamento',e.depto)

      +'<div class="dp-sec-t">Estado físico</div>'
      +row('Estado',estadoPill(e.estado))+row('Observaciones',e.obs)
      +(e.updBy?'<div style="font-size:11px;color:#9aa0a6;margin-top:14px;padding-top:10px;border-top:1px solid #f0f2f5;">Última modificación: <b>'+e.updBy+'</b> — '+e.updTs+'</div>':'')

      +row('MAC WiFi','<code style="font-size:12px;background:#f0f2f5;padding:2px 6px;border-radius:4px;">'+(e.mac_wifi||'—')+'</code>')

      +row('Password VPN',e.pass_vpn?'<span style="letter-spacing:3px;">••••••</span>&nbsp;<button class="icon-btn" onclick="togglePass(\'vpnv\',\''+encodeURIComponent(e.pass_vpn||'')+'\')">👁</button><span id="vpnv" style="display:none;font-size:12px;font-family:monospace;margin-left:8px;background:#f0f2f5;padding:2px 6px;border-radius:4px;"></span>':'—');

// ANTIGÜEDAD Y SEMÁFORO
var VIDA_UTIL = 4; // años
function calcAnios(fecha){
  if(!fecha) return null;
  var hoy = new Date();
  var compra = new Date(fecha);
  if(isNaN(compra)) return null;
  return (hoy - compra) / (1000 * 60 * 60 * 24 * 365.25);
}
function vidaClass(anios){
  if(anios === null) return '';
  if(anios >= VIDA_UTIL) return 'rojo';
  if(anios >= VIDA_UTIL - 1) return 'amarillo';
  return 'verde';
}
function vidaPill(fecha){
  var a = calcAnios(fecha);
  if(a === null) return '<span style="font-size:11px;color:#9aa0a6;">Sin fecha</span>';
  var cls = vidaClass(a);
  var dot = cls==='rojo'?'🔴':cls==='amarillo'?'🟡':'🟢';
  var txt = cls==='rojo'?'Para cambio':cls==='amarillo'?'Próximo':'En uso';
  return '<span class="vida-dot vida-'+cls+'">'+dot+' '+a.toFixed(1)+'a · '+txt+'</span>';
}
function rowClass(fecha){
  var a = calcAnios(fecha);
  if(a === null) return '';
  if(a >= VIDA_UTIL) return 'row-rojo';
  if(a >= VIDA_UTIL - 1) return 'row-amarillo';
  return '';
}

  for(var i=0;i<data.length;i+=ETIQ_POR_HOJA) hojas.push(data.slice(i,i+ETIQ_POR_HOJA));

    +'</select>'
    +'<select class="fi-sm" onchange="etiqFilter.estado=this.value;renderEtiquetas()">'

  var div=document.createElement('div');
  div.className='print-etiq-single';
  div.style.cssText='position:fixed;top:-9999px;left:-9999px;width:5cm;height:2.5cm;display:flex;align-items:center;padding:1.5mm 2mm;gap:2mm;font-family:Arial,sans-serif;background:#fff;border:.5pt solid #999;z-index:9999;';
  div.innerHTML=etiqHTML(e);
  document.body.appendChild(div);
  // Esperar a que cargue el QR
  setTimeout(function(){
    var style=document.createElement('style');
    style.id='print-etiq-style';
    style.textContent='@media print{body>*:not(.print-etiq-single){display:none!important;}.print-etiq-single{position:fixed!important;top:0!important;left:0!important;display:flex!important;}@page{size:5cm 2.5cm;margin:0;}}';
    document.head.appendChild(style);
    window.print();
    setTimeout(function(){
      document.body.removeChild(div);
      var s=document.getElementById('print-etiq-style');
      if(s)document.head.removeChild(s);
    },500);
  },800);
}

function printTodasEtiquetas(){
  var style=document.createElement('style');
  style.id='print-hoja-style';
  style.textContent='@media print{body>*{display:none!important;}#view-etiquetas{display:block!important;overflow:visible!important;background:#fff!important;}.etiq-hoja{box-shadow:none!important;page-break-after:always;}.etiq{border:.5pt solid #999!important;}@page{size:letter;margin:1cm;}}';
  document.head.appendChild(style);
  window.print();
  setTimeout(function(){
    var s=document.getElementById('print-hoja-style');
    if(s)document.head.removeChild(s);
  },500);
}

// EXPORT CSV
function exportCSV(){
  var h=['ID','Área','Plaza','Tipo','Marca','Modelo','Nombre','Responsable','Puesto','Depto','Ubicación','Usuario','Serie','Procesador','RAM','HDD Marca','HDD Serie','SSD Marca','SSD Serie','IP','MAC Eth','MAC WiFi','SO','Licencia Win','AF','Fecha Compra','Garantía','Proveedor','Precio','Factura','Estado','Observaciones'];
  var rows=equipos.map(function(e){return [e.id,e.area,e.plaza,e.tipo,e.marca,e.modelo,e.nombre,e.responsable,e.puesto,e.depto,e.ubicacion,e.usuario,e.serie,e.cpu,e.ram,e.hdd_marca,e.hdd_serie,e.ssd_marca,e.ssd_serie,e.ip,e.mac_eth,e.mac_wifi,e.so,e.lic_win,e.af,e.fecha,e.garantia,e.proveedor,e.precio,e.factura,e.estado,e.obs].map(function(v){return '"'+(v||'').toString().replace(/"/g,'""')+'"';}).join(',');});
  var csv='\uFEFF'+h.join(',')+'\n'+rows.join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='inventario_cafiver_'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('⬇ CSV exportado');
}

// CHANGE PASSWORD
function openChPass(){document.getElementById('chpass-new').value='';document.getElementById('chpass-confirm').value='';document.getElementById('chpass-error').style.display='none';document.getElementById('chpass-overlay').classList.remove('hidden');}
function closeChPass(){document.getElementById('chpass-overlay').classList.add('hidden');}
function doChPass(){var np=document.getElementById('chpass-new').value,cp=document.getElementById('chpass-confirm').value,err=document.getElementById('chpass-error');err.style.display='none';if(!np){err.textContent='Ingresa la nueva contraseña.';err.style.display='block';return;}if(np.length<6){err.textContent='Mínimo 6 caracteres.';err.style.display='block';return;}if(np!==cp){err.textContent='Las contraseñas no coinciden.';err.style.display='block';return;}var u=auth.currentUser;if(!u){err.textContent='No hay sesión activa.';err.style.display='block';return;}u.updatePassword(np).then(function(){closeChPass();toast('✅ Contraseña actualizada');}).catch(function(e){err.textContent=e.code==='auth/requires-recent-login'?'Cierra sesión, vuelve a entrar y cambia la contraseña.':'Error: '+e.message;err.style.display='block';});}

// CONFIRM
var _cb=null;
function confirmAction(t,m,cb){_cb=cb;document.getElementById('confirm-title').textContent=t;document.getElementById('confirm-msg').textContent=m;document.getElementById('confirm-overlay').classList.remove('hidden');}
function closeConfirm(){document.getElementById('confirm-overlay').classList.add('hidden');_cb=null;}
document.getElementById('confirm-ok').addEventListener('click',function(){if(_cb)_cb();closeConfirm();});

// QR HASH
function checkQRHash(){
  var hash=window.location.hash.replace('#','').trim();
  if(hash&&hash.startsWith('EQ')){setTimeout(function(){openPanel(hash);},1500);}
}

auth.onAuthStateChanged(function(user){
  if(user){
    var email=user.email.toLowerCase();
    var profile=USER_DIR[email]||{name:email.split('@')[0],color:'#1a73e8'};
    curUser={uid:user.uid,email:email,name:profile.name,color:profile.color};
    enterApp();
  }
});
</script>
