<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InventarioTech — APP CAFIVER</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- QRCode -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#1a73e8;min-height:100vh;color:#1c1e21;font-size:13px;}
body.app-mode{background:#f5f6f8;}
.hidden{display:none!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:#c8cad0;border-radius:3px;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.lcard{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:380px;box-shadow:0 12px 48px rgba(0,0,0,.3);}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:6px;border:1px solid #c8cad0;background:#fff;color:#1c1e21;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{background:#f0f1f3;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-blue{background:#1a73e8;color:#fff;border-color:#1a73e8;}
.btn-blue:hover{background:#1557b0;}
.btn-red{background:#fce8e6;color:#ea4335;border-color:transparent;}
.btn-red:hover{background:#fbd7d4;}
.btn-green{background:#e6f4ea;color:#34a853;border-color:transparent;}
.fi{font-size:13px;padding:10px 12px;border:1.5px solid #e0e2e6;border-radius:8px;outline:none;font-family:'Inter',sans-serif;width:100%;transition:border-color .15s;}
.fi:focus{border-color:#1a73e8;}

/* APP */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{height:52px;background:#fff;border-bottom:1px solid #e0e2e6;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:50;}
.logo-mark{width:28px;height:28px;background:#1a73e8;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;}
.proj-name{font-size:14px;font-weight:700;}
.tnav{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:#5f6368;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;transition:all .15s;}
.tnav:hover{background:#f0f1f3;color:#1c1e21;}
.tnav.on{background:#e8f0fe;color:#1a73e8;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.user-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:#f0f1f3;font-size:12px;font-weight:500;}
.cu-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.sync-pill{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:500;}
.sync-pill.ok{background:#e6f4ea;color:#2d6a2d;}
.sync-pill.saving{background:#e8f0fe;color:#1a73e8;}
.sync-pill.error{background:#fce8e6;color:#c0392b;}

/* VIEWS */
.view-wrap{flex:1;overflow:auto;padding:1rem 1.5rem;}

/* DASHBOARD */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:#fff;border:1px solid #e0e2e6;border-radius:12px;padding:14px 16px;}
.stat-card .lbl{font-size:11px;font-weight:600;color:#9aa0a6;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.stat-card .val{font-size:24px;font-weight:700;}
.stat-card .val.blue{color:#1a73e8;} .stat-card .val.green{color:#34a853;} .stat-card .val.amber{color:#f9ab00;} .stat-card .val.red{color:#ea4335;}

/* TABLE */
.tbl-box{background:#fff;border:1px solid #e0e2e6;border-radius:12px;overflow:hidden;margin-bottom:16px;}
.tbl-hdr{padding:10px 14px;background:#f0f1f3;border-bottom:1px solid #e0e2e6;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.tbl-hdr span{font-size:13px;font-weight:700;}
.tbl-tools{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#5f6368;padding:7px 10px;border-bottom:1px solid #e0e2e6;background:#f0f1f3;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{background:#e8eaed;}
td{padding:7px 10px;border-bottom:1px solid #e0e2e6;font-size:12px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#f7f8ff;}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.pill-desktop{background:#e8f0fe;color:#1a73e8;}
.pill-laptop{background:#e6f4ea;color:#34a853;}
.pill-servidor{background:#f3e8fd;color:#9c27b0;}
.pill-impresora{background:#fef7e0;color:#f9ab00;}
.pill-otro{background:#f0f1f3;color:#5f6368;}
.pill-bueno{background:#e6f4ea;color:#34a853;}
.pill-regular{background:#fef7e0;color:#f9ab00;}
.pill-malo{background:#fce8e6;color:#ea4335;}
.pill-baja{background:#f0f1f3;color:#9aa0a6;}
.sem-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.fi-sm{font-size:12px;padding:5px 8px;border:1.5px solid #e0e2e6;border-radius:6px;outline:none;font-family:'Inter',sans-serif;}
.fi-sm:focus{border-color:#1a73e8;}
.icon-btn{padding:4px 7px;border:1px solid #e0e2e6;border-radius:6px;cursor:pointer;background:#fff;font-size:12px;transition:all .15s;}
.icon-btn:hover{background:#f0f1f3;}
.empty-state{padding:2rem;text-align:center;color:#9aa0a6;font-size:13px;}

/* MODAL */
#overlay-form,#confirm-overlay,#qr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;z-index:400;padding:20px;overflow-y:auto;}
.modal-card{background:#fff;border-radius:12px;width:100%;max-width:720px;box-shadow:0 8px 32px rgba(0,0,0,.18);margin:auto;}
.modal-card.wide{max-width:900px;}
.modal-hd{padding:14px 18px;border-bottom:1px solid #e0e2e6;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;border-radius:12px 12px 0 0;}
.modal-hd h3{font-size:15px;font-weight:700;}
.modal-body{padding:16px 18px 20px;}
.modal-footer{padding:12px 18px;border-top:1px solid #e0e2e6;display:flex;justify-content:flex-end;gap:8px;}
.form-section{font-size:10px;font-weight:700;color:#1a73e8;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1.5px solid #e8f0fe;}
.af{margin-bottom:10px;}
.af label{display:block;font-size:10px;font-weight:700;color:#5f6368;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.af input,.af select,.af textarea{width:100%;font-size:12px;padding:7px 10px;border:1.5px solid #e0e2e6;border-radius:7px;outline:none;font-family:'Inter',sans-serif;}
.af input:focus,.af select:focus,.af textarea:focus{border-color:#1a73e8;}
.af textarea{resize:vertical;min-height:70px;line-height:1.5;}
.af-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.af-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.confirm-card{background:#fff;border-radius:12px;padding:1.5rem;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.confirm-card h3{font-size:15px;font-weight:700;margin-bottom:.75rem;}
.confirm-card p{font-size:13px;color:#5f6368;line-height:1.6;margin-bottom:1rem;}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end;}

/* DETAIL PANEL */
#dp{position:fixed;top:0;right:0;width:500px;height:100vh;background:#fff;border-left:1px solid #e0e2e6;z-index:200;display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.1);transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
#dp.open{transform:translateX(0);}
#dp-overlay{position:fixed;inset:0;z-index:199;display:none;}
#dp-overlay.on{display:block;}
.dp-hd{padding:14px 18px 10px;border-bottom:1px solid #e0e2e6;flex-shrink:0;}
.dp-tabs{display:flex;border-bottom:1px solid #e0e2e6;padding:0 18px;flex-shrink:0;}
.dp-tab{padding:9px 14px;font-size:12px;font-weight:600;color:#5f6368;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;font-family:'Inter',sans-serif;}
.dp-tab.on{color:#1a73e8;border-bottom-color:#1a73e8;}
.dp-body{flex:1;overflow-y:auto;padding:16px 18px;}
.dp-row{display:grid;grid-template-columns:130px 1fr;align-items:start;padding:7px 0;border-bottom:1px solid #e0e2e6;}
.dp-row:last-child{border-bottom:none;}
.dp-key{font-size:11px;color:#9aa0a6;font-weight:600;text-transform:uppercase;letter-spacing:.03em;padding-top:2px;}
.dp-val{font-size:13px;font-weight:500;word-break:break-all;}
.dp-sec-t{font-size:10px;font-weight:700;color:#1a73e8;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px;padding-bottom:4px;border-bottom:1.5px solid #e8f0fe;}

/* QR */
.qr-grid{display:flex;flex-wrap:wrap;gap:16px;padding:16px;}
.qr-card{background:#fff;border:1px solid #e0e2e6;border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;width:190px;}
.qr-card .qr-lbl{font-size:12px;font-weight:700;text-align:center;color:#1c1e21;}
.qr-card .qr-sub{font-size:11px;color:#9aa0a6;text-align:center;}

/* REPARACIONES */
.rep-card{background:#fff;border:1px solid #e0e2e6;border-radius:10px;padding:12px 16px;margin-bottom:10px;}
.rep-card .rep-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.rep-card .rep-title{font-size:13px;font-weight:700;}
.rep-card .rep-meta{font-size:12px;color:#5f6368;margin-top:2px;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:#323232;color:#fff;padding:8px 20px;border-radius:8px;font-size:12px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:999;max-width:90vw;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media print{#dp,#dp-overlay,#overlay-form,#confirm-overlay,.topbar-right{display:none!important;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lcard">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="width:56px;height:56px;background:#1a73e8;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 4px 16px rgba(26,115,232,.35);">
        <span style="color:#fff;font-size:26px;">🖥</span>
      </div>
      <div style="font-size:20px;font-weight:700;color:#1c1e21;">InventarioTech</div>
      <div style="font-size:12px;color:#5f6368;margin-top:4px;">APP CAFIVER</div>
    </div>
    <div id="login-error" style="display:none;background:#fce8e6;color:#c0392b;border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:16px;line-height:1.5;"></div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="font-size:11px;font-weight:600;color:#5f6368;letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:5px;">Correo electrónico</label>
        <input class="fi" type="email" id="login-email" placeholder="correo@cafiver.com.mx" autocomplete="email">
      </div>
      <div>
        <label style="font-size:11px;font-weight:600;color:#5f6368;letter-spacing:.04em;text-transform:uppercase;display:block;margin-bottom:5px;">Contraseña</label>
        <div style="position:relative;">
          <input class="fi" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px;letter-spacing:2px;">
          <button id="toggle-pass-btn" type="button" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9aa0a6;font-size:18px;line-height:1;padding:4px;">👁</button>
        </div>
      </div>
      <button id="login-btn" type="button" style="background:#1a73e8;color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;width:100%;">
        Iniciar sesión
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="logo-mark">🖥</div>
    <span class="proj-name">APP CAFIVER</span>
    <button class="tnav on"  id="tnav-dashboard"   onclick="switchView('dashboard')">📊 Dashboard</button>
    <button class="tnav"     id="tnav-inventario"  onclick="switchView('inventario')">🗃 Inventario</button>
    <button class="tnav"     id="tnav-qr"          onclick="switchView('qr')">⬛ Códigos QR</button>
    <button class="tnav"     id="tnav-reparaciones" onclick="switchView('reparaciones')">🔧 Reparaciones</button>
    <div class="topbar-right">
      <div class="sync-pill ok" id="topbar-sync">
        <span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;"></span>
        <span id="topbar-sync-txt">En línea</span>
      </div>
      <div class="user-pill" style="cursor:pointer;" onclick="openChPass()" title="Cambiar contraseña">
        <div class="cu-av" id="cur-av"></div>
        <span id="cur-nm"></span>
        <span style="font-size:10px;color:#9aa0a6;">🔐</span>
      </div>
      <button class="btn btn-sm btn-blue" onclick="openFormEquipo()">+ Equipo</button>
      <button class="btn btn-sm" onclick="window.print()">🖨</button>
      <button class="btn btn-sm" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div id="view-dashboard"    class="view-wrap hidden"></div>
  <div id="view-inventario"   class="view-wrap hidden"></div>
  <div id="view-qr"           class="view-wrap hidden" style="padding:0;"></div>
  <div id="view-reparaciones" class="view-wrap hidden"></div>
</div>

<!-- DETAIL PANEL -->
<div id="dp-overlay" onclick="closePanel()"></div>
<div id="dp">
  <div class="dp-hd">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
      <div>
        <div id="dp-title" style="font-size:15px;font-weight:700;margin-bottom:4px;"></div>
        <div id="dp-sub"   style="font-size:12px;color:#5f6368;"></div>
      </div>
      <div style="display:flex;gap:4px;">
        <button class="icon-btn" onclick="editFromPanel()" title="Editar">✏️</button>
        <button class="icon-btn" onclick="deleteFromPanel()" title="Eliminar" style="color:#ea4335;">🗑</button>
        <button class="icon-btn" onclick="closePanel()">✕</button>
      </div>
    </div>
  </div>
  <div class="dp-tabs">
    <button class="dp-tab on" id="dpt-info"       onclick="dpTab('info')">Información</button>
    <button class="dp-tab"    id="dpt-red"        onclick="dpTab('red')">Red</button>
    <button class="dp-tab"    id="dpt-compra"     onclick="dpTab('compra')">Compra</button>
    <button class="dp-tab"    id="dpt-historial"  onclick="dpTab('historial')">Historial</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<!-- FORM EQUIPO MODAL -->
<div id="overlay-form" class="hidden" onclick="if(event.target===this)closeFormEquipo()">
  <div class="modal-card wide">
    <div class="modal-hd">
      <h3 id="form-modal-title">Nuevo equipo</h3>
      <button class="icon-btn" onclick="closeFormEquipo()">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-section">Identificación general</div>
      <div class="af-g3">
        <div class="af"><label>Área *</label><input type="text" id="f-area" placeholder="Ej. Comercializadora Nacional"></div>
        <div class="af"><label>Plaza *</label><input type="text" id="f-plaza" placeholder="Ej. Ixtaczoquitlán"></div>
        <div class="af"><label>Nombre del equipo</label><input type="text" id="f-nombre" placeholder="Ej. ResidenteAS"></div>
      </div>
      <div class="af-g3">
        <div class="af"><label>Ubicación</label><input type="text" id="f-ubicacion" placeholder="Ej. Autoservicio"></div>
        <div class="af"><label>Usuario de red</label><input type="text" id="f-usuario" placeholder="Ej. residenteanaquel"></div>
        <div class="af"><label>Estado físico</label>
          <select id="f-estado"><option>Bueno</option><option>Regular</option><option>Malo</option><option>Baja</option></select>
        </div>
      </div>

      <div class="form-section">Hardware</div>
      <div class="af-g3">
        <div class="af"><label>Tipo de equipo *</label>
          <select id="f-tipo"><option>Desktop</option><option>Laptop</option><option>Servidor</option><option>Impresora</option><option>Otro</option></select>
        </div>
        <div class="af"><label>Marca *</label><input type="text" id="f-marca" placeholder="Ej. DELL"></div>
        <div class="af"><label>Modelo *</label><input type="text" id="f-modelo" placeholder="Ej. Vostro 230"></div>
      </div>
      <div class="af-g3">
        <div class="af"><label>Número de serie</label><input type="text" id="f-serie" placeholder="Serie del equipo"></div>
        <div class="af"><label>Procesador</label><input type="text" id="f-cpu" placeholder="Ej. Dual Core E5400"></div>
        <div class="af"><label>RAM</label><input type="text" id="f-ram" placeholder="Ej. 4GB"></div>
      </div>

      <div class="form-section">Almacenamiento</div>
      <div class="af-g2">
        <div class="af"><label>HDD — Marca</label><input type="text" id="f-hdd-marca" placeholder="Marca del disco duro"></div>
        <div class="af"><label>HDD — Número de serie</label><input type="text" id="f-hdd-serie" placeholder="Serie del HDD"></div>
      </div>
      <div class="af-g2">
        <div class="af"><label>SSD — Marca</label><input type="text" id="f-ssd-marca" placeholder="Marca del SSD"></div>
        <div class="af"><label>SSD — Número de serie</label><input type="text" id="f-ssd-serie" placeholder="Serie del SSD"></div>
      </div>

      <div class="form-section">Red</div>
      <div class="af-g3">
        <div class="af"><label>Dirección IP</label><input type="text" id="f-ip" placeholder="Ej. 192.168.1.100"></div>
        <div class="af"><label>MAC Ethernet</label><input type="text" id="f-mac-eth" placeholder="00-26-2D-24-FD-B9"></div>
        <div class="af"><label>MAC WiFi</label><input type="text" id="f-mac-wifi" placeholder="80-3F-5D-18-37-94"></div>
      </div>

      <div class="form-section">Software y accesos</div>
      <div class="af-g3">
        <div class="af"><label>Sistema Operativo</label><input type="text" id="f-so" placeholder="Ej. Windows 10 Pro"></div>
        <div class="af"><label>Licencia Windows</label><input type="text" id="f-lic-win" placeholder="Clave de licencia"></div>
        <div class="af"><label>Password red</label><input type="password" id="f-pass" placeholder="Contraseña de red"></div>
      </div>
      <div class="af-g2">
        <div class="af"><label>Password VPN</label><input type="password" id="f-pass-vpn" placeholder="Contraseña VPN"></div>
        <div class="af"><label>Pass (campo adicional)</label><input type="password" id="f-pass2" placeholder=""></div>
      </div>

      <div class="form-section">Compra y garantía</div>
      <div class="af-g3">
        <div class="af"><label>Fecha de compra</label><input type="date" id="f-fecha"></div>
        <div class="af"><label>Garantía</label><input type="text" id="f-garantia" placeholder="Ej. 1 año, vencida"></div>
        <div class="af"><label>Proveedor</label><input type="text" id="f-proveedor" placeholder="Nombre del proveedor"></div>
      </div>
      <div class="af-g3">
        <div class="af"><label>Precio ($)</label><input type="number" id="f-precio" placeholder="0.00" step="0.01"></div>
        <div class="af"><label>Factura</label><input type="text" id="f-factura" placeholder="Folio o 'No hay datos'"></div>
      </div>

      <div class="form-section">Observaciones</div>
      <div class="af"><textarea id="f-obs" placeholder="Notas, condiciones especiales, daños visibles..."></textarea></div>

    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeFormEquipo()">Cancelar</button>
      <button class="btn btn-blue" onclick="saveEquipo()">💾 Guardar equipo</button>
    </div>
  </div>
</div>

<!-- FORM REPARACIÓN MODAL -->
<div id="overlay-rep" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:400;" onclick="if(event.target===this)closeFormRep()">
  <div class="modal-card" style="max-width:560px;">
    <div class="modal-hd">

function showLoginError(msg){ var el=document.getElementById('login-error'); el.textContent=msg; el.style.display='block'; }
function doLogin(){
  var email=(document.getElementById('login-email').value||'').trim().toLowerCase();
  var pass=(document.getElementById('login-pass').value||'').trim();
  var btn=document.getElementById('login-btn');
  document.getElementById('login-error').style.display='none';
  if(!email){ showLoginError('Escribe tu correo.'); return; }
  if(!pass){ showLoginError('Escribe tu contraseña.'); return; }
  btn.textContent='Entrando...'; btn.disabled=true; btn.style.opacity='.7';
  auth.signInWithEmailAndPassword(email,pass)
    .then(function(cred){
      var profile=USER_DIR[email]||{name:email.split('@')[0],color:'#1a73e8'};
      curUser={uid:cred.user.uid,email:email,name:profile.name,color:profile.color};
      enterApp();
    })
    .catch(function(e){
      btn.textContent='Iniciar sesión'; btn.disabled=false; btn.style.opacity='1';
      var msg='Correo o contraseña incorrectos.';
      if(e.code==='auth/user-not-found') msg='Usuario no encontrado.';
      if(e.code==='auth/wrong-password') msg='Contraseña incorrecta.';
      if(e.code==='auth/invalid-credential') msg='Correo o contraseña incorrectos.';
      if(e.code==='auth/invalid-email') msg='Formato de correo inválido.';
      if(e.code==='auth/too-many-requests') msg='Demasiados intentos. Espera unos minutos.';
      if(e.code==='auth/network-request-failed') msg='Sin conexión a internet.';
      showLoginError(msg);
    });
}

    document.getElementById('login-error').style.display='none';

function renderDashboard(){

      '<div class="stat-card"><div class="lbl">Regular</div><div class="val amber">'+(byEstado.Regular||0)+'</div></div>'+
      '<div class="stat-card"><div class="lbl">Malo / Baja</div><div class="val red">'+((byEstado.Malo||0)+(byEstado.Baja||0))+'</div></div>'+

      '<div class="stat-card"><div class="lbl">Servidores</div><div class="val">'+(byTipo.Servidor||0)+'</div></div>'+

    '</div>'+
    '<div class="tbl-box"><div class="tbl-hdr"><span>Últimos equipos registrados</span></div>'+
    '<div style="overflow-x:auto;"><table><thead><tr><th>ID</th><th>Área</th><th>Plaza</th><th>Tipo</th><th>Marca / Modelo</th><th>Estado</th></tr></thead><tbody>'+
    equipos.slice(-8).reverse().map(function(e){
      return '<tr style="cursor:pointer;" ondblclick="openPanel(\''+e.id+'\')">'+'<td style="font-family:monospace;font-size:11px;">'+e.id+'</td><td>'+e.area+'</td><td>'+e.plaza+'</td><td>'+tipoPill(e.tipo)+'</td><td><b>'+e.marca+'</b> '+e.modelo+'</td><td>'+estadoPill(e.estado)+'</td></tr>';

// ═══════════════════════════════════
// INVENTARIO TABLE
// ═══════════════════════════════════
var invFilter={q:'',tipo:'',estado:'',plaza:''};

function renderInventario(){
  var w=document.getElementById('view-inventario'); if(!w) return;
  var data=equipos.filter(function(e){
    var q=invFilter.q.toLowerCase();
    if(q&&!(e.nombre+e.modelo+e.marca+e.plaza+e.area+e.serie+e.ip+e.so+e.usuario).toLowerCase().includes(q)) return false;
    if(invFilter.tipo&&e.tipo!==invFilter.tipo) return false;
    if(invFilter.estado&&e.estado!==invFilter.estado) return false;
    if(invFilter.plaza&&e.plaza!==invFilter.plaza) return false;
    return true;
  });
  if(sortCol){ data.sort(function(a,b){ var av=a[sortCol]||'',bv=b[sortCol]||''; return sortAsc?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0); }); }
  var plazas=[]; equipos.forEach(function(e){ if(plazas.indexOf(e.plaza)<0&&e.plaza) plazas.push(e.plaza); });
  w.innerHTML=
    '<div class="tbl-box">'+
    '<div class="tbl-hdr">'+
      '<span>'+data.length+' equipo'+(data.length!==1?'s':'')+'</span>'+
      '<div class="tbl-tools">'+
        '<input class="fi-sm" type="text" placeholder="Buscar..." value="'+invFilter.q+'" oninput="invFilter.q=this.value;renderInventario()" style="width:180px;">'+
        '<select class="fi-sm" onchange="invFilter.tipo=this.value;renderInventario()">'+
          '<option value="">Todos los tipos</option>'+
          ['Desktop','Laptop','Servidor','Impresora','Otro'].map(function(t){ return '<option value="'+t+'"'+(invFilter.tipo===t?' selected':'')+'>'+t+'</option>'; }).join('')+
        '</select>'+
        '<select class="fi-sm" onchange="invFilter.estado=this.value;renderInventario()">'+
          '<option value="">Todos los estados</option>'+
          ['Bueno','Regular','Malo','Baja'].map(function(t){ return '<option value="'+t+'"'+(invFilter.estado===t?' selected':'')+'>'+t+'</option>'; }).join('')+
        '</select>'+
        '<select class="fi-sm" onchange="invFilter.plaza=this.value;renderInventario()">'+
          '<option value="">Todas las plazas</option>'+
          plazas.map(function(p){ return '<option value="'+p+'"'+(invFilter.plaza===p?' selected':'')+'>'+p+'</option>'; }).join('')+
        '</select>'+
        '<button class="btn btn-blue btn-sm" onclick="openFormEquipo()">+ Nuevo</button>'+
      '</div>'+
    '</div>'+
    '<div style="overflow-x:auto;"><table>'+
    '<thead><tr>'+
      ['id','tipo','area','plaza','marca','nombre','cpu','ram','ip','so','estado',''].map(function(c,i){
        var lbl=['ID','Tipo','Área','Plaza','Marca/Modelo','Nombre equipo','Procesador','RAM','IP','S.O.','Estado','Acciones'][i];
        if(!c) return '<th>'+lbl+'</th>';
        return '<th onclick="sortBy(\''+c+'\')" style="cursor:pointer;">'+lbl+(sortCol===c?(sortAsc?' ▲':' ▼'):' ⇅')+'</th>';
      }).join('')+
    '</tr></thead><tbody>'+
    (data.length?data.map(function(e){
      return '<tr style="cursor:pointer;" ondblclick="openPanel(\''+e.id+'\')">'
        +'<td style="font-family:monospace;font-size:10px;color:#9aa0a6;">'+e.id+'</td>'
        +'<td>'+tipoPill(e.tipo)+'</td>'
        +'<td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+e.area+'</td>'
        +'<td style="white-space:nowrap;">'+e.plaza+'</td>'
        +'<td><b style="font-weight:600;">'+e.marca+'</b> '+e.modelo+'</td>'
        +'<td>'+( e.nombre||'—')+'</td>'
        +'<td style="font-size:11px;">'+( e.cpu||'—')+'</td>'
        +'<td style="font-size:11px;">'+( e.ram||'—')+'</td>'
        +'<td style="font-family:monospace;font-size:11px;">'+( e.ip||'—')+'</td>'
        +'<td style="font-size:11px;">'+( e.so||'—')+'</td>'
        +'<td>'+estadoPill(e.estado)+'</td>'
        +'<td><div style="display:flex;gap:4px;">'
          +'<button class="icon-btn" title="Ver detalle" onclick="event.stopPropagation();openPanel(\''+e.id+'\')">👁</button>'
          +'<button class="icon-btn" title="Editar"      onclick="event.stopPropagation();editEquipo(\''+e.id+'\')">✏️</button>'
          +'<button class="icon-btn" title="Reparación"  onclick="event.stopPropagation();openFormRepFor(\''+e.id+'\')">🔧</button>'
          +'<button class="icon-btn" title="Eliminar"    onclick="event.stopPropagation();deleteEquipo(\''+e.id+'\')">🗑</button>'
          +'</div></td>'
        +'</tr>';
    }).join(''):'<tr><td colspan="12" class="empty-state">No hay equipos registrados</td></tr>')+
    '</tbody></table></div></div>';
}

function sortBy(col){ if(sortCol===col)sortAsc=!sortAsc; else{sortCol=col;sortAsc=true;} renderInventario(); }

function fillForm(e){

function saveEquipo(){
  var e=getFormValues();
  if(!e.area||!e.marca||!e.modelo){ alert('Área, Marca y Modelo son obligatorios.'); return; }
  fbSave(e);
  closeFormEquipo();
  toast(editingId?'✅ Equipo actualizado':'✅ Equipo guardado');
}
function deleteEquipo(id){
  var e=equipos.find(function(x){ return x.id===id; }); if(!e) return;
  confirmAction('¿Eliminar equipo?',e.marca+' '+e.modelo+' ('+e.id+')',function(){
    db.collection('equipos').doc(id).delete().then(function(){ closePanel(); toast('Equipo eliminado'); });
  });
}

// ═══════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════
function openPanel(id){
  var e=equipos.find(function(x){ return x.id===id; }); if(!e) return;
  openEquipoId=id;
  document.getElementById('dp-title').textContent=(e.nombre||e.modelo)+' — '+e.marca;
  document.getElementById('dp-sub').innerHTML=tipoPill(e.tipo)+' &nbsp;'+estadoPill(e.estado)+' &nbsp;<span style="font-size:11px;color:#9aa0a6;">'+e.id+'</span>';
  dpTab(dpCurTab);
  document.getElementById('dp').classList.add('open');
  document.getElementById('dp-overlay').classList.add('on');
}
function closePanel(){
  document.getElementById('dp').classList.remove('open');
  document.getElementById('dp-overlay').classList.remove('on');
  openEquipoId=null;
}
function editFromPanel(){ closePanel(); if(openEquipoId||true) editEquipo(openEquipoId); }
function deleteFromPanel(){ deleteEquipo(openEquipoId); }

function dpTab(tab){
  dpCurTab=tab;
  ['info','red','compra','historial'].forEach(function(x){ document.getElementById('dpt-'+x).classList.toggle('on',x===tab); });
  var e=equipos.find(function(x){ return x.id===openEquipoId; }); if(!e) return;
  var body=document.getElementById('dp-body');
  if(tab==='info'){
    body.innerHTML=
      '<div class="dp-sec-t">Identificación</div>'+
      row('Área',e.area)+row('Plaza',e.plaza)+row('Ubicación',e.ubicacion)+row('Nombre equipo',e.nombre)+row('Usuario de red',e.usuario)+
      '<div class="dp-sec-t">Hardware</div>'+
      row('Tipo',tipoPill(e.tipo))+row('Marca',e.marca)+row('Modelo',e.modelo)+row('N° de serie',e.serie)+
      row('Procesador',e.cpu)+row('RAM',e.ram)+
      '<div class="dp-sec-t">Almacenamiento</div>'+
      row('HDD Marca',e.hdd_marca)+row('HDD Serie',e.hdd_serie)+
      row('SSD Marca',e.ssd_marca)+row('SSD Serie',e.ssd_serie)+
      '<div class="dp-sec-t">Software</div>'+
      row('Sistema Operativo',e.so)+row('Licencia Windows',e.lic_win)+
      '<div class="dp-sec-t">Estado</div>'+
      row('Estado físico',estadoPill(e.estado))+row('Observaciones',e.obs)+
      (e.updBy?'<div style="font-size:11px;color:#9aa0a6;margin-top:14px;">Última modificación: '+e.updBy+' — '+e.updTs+'</div>':'');
  } else if(tab==='red'){
    body.innerHTML=
      '<div class="dp-sec-t">Configuración de red</div>'+
      row('Dirección IP',e.ip)+row('MAC Ethernet','<code style="font-size:12px;">'+( e.mac_eth||'—')+'</code>')+
      row('MAC WiFi','<code style="font-size:12px;">'+( e.mac_wifi||'—')+'</code>')+
      '<div class="dp-sec-t">Accesos (protegidos)</div>'+
      row('Usuario red',e.usuario)+
      row('Password red',e.pass?'<span style="letter-spacing:3px;font-size:14px;">••••••</span>&nbsp;<button class="icon-btn" onclick="togglePass(\'pass-val\',\''+encodeURIComponent(e.pass||'')+'\')">👁</button><span id="pass-val" style="display:none;font-size:12px;font-family:monospace;margin-left:8px;"></span>':'—')+
      row('Password VPN',e.pass_vpn?'<span style="letter-spacing:3px;font-size:14px;">••••••</span>&nbsp;<button class="icon-btn" onclick="togglePass(\'vpn-val\',\''+encodeURIComponent(e.pass_vpn||'')+'\')">👁</button><span id="vpn-val" style="display:none;font-size:12px;font-family:monospace;margin-left:8px;"></span>':'—');
  } else if(tab==='compra'){
    var reps=reparaciones.filter(function(r){ return r.equipo_id===openEquipoId; });
    var totalRep=reps.reduce(function(a,r){ return a+( parseFloat(r.costo)||0); },0);
    body.innerHTML=
      '<div class="dp-sec-t">Datos de adquisición</div>'+
      row('Fecha de compra',e.fecha||'—')+row('Garantía',e.garantia)+row('Proveedor',e.proveedor)+
      row('Precio',fmt$(e.precio))+row('Factura',e.factura)+
      '<div class="dp-sec-t">Historial de reparaciones ('+reps.length+')</div>'+
      (reps.length?
        row('Total invertido en reparaciones',fmt$(totalRep))+
        reps.map(function(r){
          return '<div style="background:#f7f8ff;border:1px solid #e0e2e6;border-radius:8px;padding:10px 12px;margin-bottom:8px;">'
            +'<div style="display:flex;justify-content:space-between;margin-bottom:4px;">'
            +'<b style="font-size:12px;">'+r.falla+'</b><span style="font-size:11px;color:#9aa0a6;">'+r.fecha+'</span></div>'
            +'<div style="font-size:12px;color:#5f6368;">'+( r.desc||'')+'</div>'
            +(r.tecnico?'<div style="font-size:11px;margin-top:4px;color:#9aa0a6;">Técnico: '+r.tecnico+'</div>':'')
            +(r.costo?'<div style="font-size:12px;font-weight:600;color:#1a73e8;margin-top:4px;">Costo: '+fmt$(r.costo)+'</div>':'')
            +'</div>';
        }).join(''):
        '<div style="font-size:12px;color:#9aa0a6;padding:8px 0;">Sin reparaciones registradas.</div>'+
        '<button class="btn btn-sm" onclick="openFormRepFor(\''+openEquipoId+'\')">+ Registrar reparación</button>'
      );
  } else if(tab==='historial'){
    body.innerHTML='<div style="font-size:12px;color:#9aa0a6;padding:16px 0;text-align:center;">Historial de cambios en desarrollo.</div>';
  }
}
function row(k,v){ return '<div class="dp-row"><div class="dp-key">'+k+'</div><div class="dp-val">'+(v||'—')+'</div></div>'; }
function togglePass(spanId, encoded){
  var s=document.getElementById(spanId); if(!s) return;
  if(s.style.display==='none'){ s.textContent=decodeURIComponent(encoded); s.style.display='inline'; }
  else s.style.display='none';
}

// ═══════════════════════════════════
// QR
// ═══════════════════════════════════
function makeQRSvg(text, size){
  // QR via Google Charts API — confiable, sin dependencias
  var url='https://api.qrserver.com/v1/create-qr-code/?size='+size+'x'+size+'&data='+encodeURIComponent(text)+'&color=1a73e8&bgcolor=ffffff&margin=4';
  return '<img src="'+url+'" width="'+size+'" height="'+size+'" style="display:block;border-radius:4px;" loading="lazy">';
}

function renderQR(){
  var w=document.getElementById('view-qr'); if(!w) return;
  var q=document.getElementById('qr-search')?document.getElementById('qr-search').value.toLowerCase():'';
  var data=q?equipos.filter(function(e){ return (e.nombre+e.modelo+e.plaza+e.marca+e.id).toLowerCase().includes(q); }):equipos;
  w.innerHTML=
    '<div style="padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #e0e2e6;background:#fff;flex-wrap:wrap;">'
    +'<input class="fi-sm" type="text" id="qr-search" placeholder="Filtrar por nombre, plaza, modelo..." style="width:240px;" oninput="renderQR()" value="'+(q||'')+'">'
    +'<span style="font-size:12px;color:#9aa0a6;">'+data.length+' equipo(s)</span>'
    +'<button class="btn btn-sm" onclick="window.print()">🖨 Imprimir</button>'
    +'</div>'
    +'<div class="qr-grid" id="qr-grid">'
    +data.map(function(e){
      var qrText='https://robertoamayar.github.io/inventario-cafiver/#'+e.id;
      return '<div class="qr-card">'
        +makeQRSvg(qrText,150)
        +'<div class="qr-lbl">'+e.id+'</div>'
        +'<div class="qr-sub">'+(e.nombre||e.modelo)+'</div>'
        +'<div class="qr-sub">'+e.marca+' '+e.tipo+' · '+e.plaza+'</div>'
        +'<button class="btn btn-sm" style="width:100%;justify-content:center;" onclick="openPanel(\''+e.id+'\')">Ver detalle</button>'
        +'</div>';
    }).join('')
    +'</div>';
}

function openFormRepFor(equipoId){
  closePanel();
  var sel=document.getElementById('rep-equipo-sel');
  sel.innerHTML=equipos.map(function(e){ return '<option value="'+e.id+'"'+(e.id===equipoId?' selected':'')+'>'+e.id+' — '+(e.nombre||e.modelo)+' ('+e.plaza+')</option>'; }).join('');
  document.getElementById('rep-fecha').value=new Date().toISOString().slice(0,10);
  ['rep-tecnico','rep-falla','rep-desc'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('rep-costo').value='';
  document.getElementById('rep-estado').value='Bueno';
  document.getElementById('rep-modal-title').textContent='Nueva reparación';
  document.getElementById('overlay-rep').style.display='flex';
}
function closeFormRep(){ document.getElementById('overlay-rep').style.display='none'; }
function saveReparacion(){
  var eqId=document.getElementById('rep-equipo-sel').value;
  var eq=equipos.find(function(e){ return e.id===eqId; }); if(!eq) return;
  var rep={
    id:'R'+Date.now().toString(36).toUpperCase(),
    equipo_id:eqId,
    equipo_nombre:(eq.nombre||eq.modelo)+' ('+eq.plaza+')',
    fecha:document.getElementById('rep-fecha').value,
    tecnico:document.getElementById('rep-tecnico').value.trim(),
    falla:document.getElementById('rep-falla').value.trim(),
    costo:parseFloat(document.getElementById('rep-costo').value)||0,
    estado_result:document.getElementById('rep-estado').value,
    desc:document.getElementById('rep-desc').value.trim(),
    registradoPor:curUser?curUser.name:'',
    ts:nowStr()
  };
  db.collection('reparaciones').doc(rep.id).set(rep);
  // Actualizar estado del equipo
  eq.estado=rep.estado_result; eq.updBy=curUser?curUser.name:''; eq.updTs=nowStr();
  fbSave(eq);
  closeFormRep();
  toast('✅ Reparación registrada');
}
function renderReparaciones(){
  var w=document.getElementById('view-reparaciones'); if(!w) return;
  var q=document.getElementById('rep-filter-q')?document.getElementById('rep-filter-q').value.toLowerCase():'';
  var data=q?reparaciones.filter(function(r){ return (r.equipo_nombre+r.falla+r.tecnico).toLowerCase().includes(q); }):reparaciones;
  var totalCosto=data.reduce(function(a,r){ return a+(parseFloat(r.costo)||0); },0);
  w.innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">'
    +'<h2 style="font-size:16px;font-weight:700;">Reparaciones <span style="font-size:13px;color:#9aa0a6;font-weight:400;">('+data.length+')</span></h2>'
    +'<div style="display:flex;gap:8px;align-items:center;">'
    +'<input class="fi-sm" type="text" id="rep-filter-q" placeholder="Buscar..." style="width:180px;" oninput="renderReparaciones()">'
    +'<button class="btn btn-blue btn-sm" onclick="openFormRepFor(\'\')">+ Nueva</button>'
    +'</div></div>'
    +(data.length?
      '<div style="background:#e8f0fe;border:1px solid #b8d0f5;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;display:flex;gap:20px;">'
      +'<span>Total registros: <b>'+data.length+'</b></span>'
      +'<span>Total invertido: <b>'+fmt$(totalCosto)+'</b></span>'
      +'</div>':'')+
    data.slice().reverse().map(function(r){
      var sc=r.estado_result==='Bueno'?'#34a853':r.estado_result==='Regular'?'#f9ab00':r.estado_result==='Malo'?'#ea4335':'#9aa0a6';
      return '<div class="rep-card">'
        +'<div class="rep-hd">'
        +'<div><div class="rep-title">🔧 '+r.equipo_nombre+'</div><div class="rep-meta">'+(r.falla||'Sin descripción de falla')+' &nbsp;·&nbsp; '+r.fecha+'</div></div>'
        +'<div style="text-align:right;">'
        +(r.costo?'<div style="font-weight:700;color:#1a73e8;font-size:13px;">'+fmt$(r.costo)+'</div>':'')
        +'<span class="pill" style="background:'+sc+'22;color:'+sc+';">'+r.estado_result+'</span>'
        +'</div></div>'
        +(r.desc?'<div style="font-size:12px;color:#5f6368;margin-top:4px;">'+r.desc+'</div>':'')
        +(r.tecnico?'<div style="font-size:11px;margin-top:4px;color:#9aa0a6;">Técnico: <b>'+r.tecnico+'</b></div>':'')
        +(r.registradoPor?'<div style="font-size:11px;color:#9aa0a6;">Registró: '+r.registradoPor+'</div>':'')
        +'</div>';
    }).join('')+
    (!data.length?'<div class="empty-state" style="background:#fff;border:1px solid #e0e2e6;border-radius:12px;padding:2rem;">Sin reparaciones registradas.</div>':'');
}

function exportCSV(){
  var headers=['ID','Área','Plaza','Tipo','Marca','Modelo','Nombre','Ubicación','Usuario','Serie','Procesador','RAM','HDD Marca','HDD Serie','SSD Marca','SSD Serie','IP','MAC Eth','MAC WiFi','SO','Licencia Win','Fecha Compra','Garantía','Proveedor','Precio','Factura','Estado','Observaciones'];
  var rows=equipos.map(function(e){ return [e.id,e.area,e.plaza,e.tipo,e.marca,e.modelo,e.nombre,e.ubicacion,e.usuario,e.serie,e.cpu,e.ram,e.hdd_marca,e.hdd_serie,e.ssd_marca,e.ssd_serie,e.ip,e.mac_eth,e.mac_wifi,e.so,e.lic_win,e.fecha,e.garantia,e.proveedor,e.precio,e.factura,e.estado,e.obs].map(function(v){ return '"'+(v||'').toString().replace(/"/g,'""')+'"'; }).join(','); });
  var csv='\uFEFF'+headers.join(',')+'\n'+rows.join('\n');
  var a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'})); a.download='inventario_cafiver_'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); toast('⬇ CSV exportado');
}

// ═══════════════════════════════════
// CHANGE PASSWORD
// ═══════════════════════════════════
function openChPass(){ document.getElementById('chpass-new').value=''; document.getElementById('chpass-confirm').value=''; document.getElementById('chpass-error').style.display='none'; document.getElementById('chpass-overlay').classList.remove('hidden'); }
function closeChPass(){ document.getElementById('chpass-overlay').classList.add('hidden'); }
function doChPass(){
  var np=document.getElementById('chpass-new').value, cp=document.getElementById('chpass-confirm').value;
  var err=document.getElementById('chpass-error'); err.style.display='none';
  if(!np){ err.textContent='Ingresa la nueva contraseña.'; err.style.display='block'; return; }
  if(np.length<6){ err.textContent='Mínimo 6 caracteres.'; err.style.display='block'; return; }
  if(np!==cp){ err.textContent='Las contraseñas no coinciden.'; err.style.display='block'; return; }
  var user=auth.currentUser; if(!user){ err.textContent='No hay sesión activa.'; err.style.display='block'; return; }
  user.updatePassword(np)
    .then(function(){ closeChPass(); toast('✅ Contraseña actualizada'); })
    .catch(function(e){ err.textContent=e.code==='auth/requires-recent-login'?'Cierra sesión, vuelve a entrar y luego cambia la contraseña.':'Error: '+e.message; err.style.display='block'; });
}

var _cb=null;
function confirmAction(title,msg,cb){ _cb=cb; document.getElementById('confirm-title').textContent=title; document.getElementById('confirm-msg').textContent=msg; document.getElementById('confirm-overlay').classList.remove('hidden'); }
function closeConfirm(){ document.getElementById('confirm-overlay').classList.add('hidden'); _cb=null; }
document.getElementById('confirm-ok').addEventListener('click',function(){ if(_cb)_cb(); closeConfirm(); });

// AUTH STATE
// ═══════════════════════════════════
// Abrir equipo desde QR (hash en URL)
function checkQRHash(){
  var hash=window.location.hash.replace("#","").trim();
  if(hash&&hash.startsWith("EQ")){
    setTimeout(function(){ openPanel(hash); },1200);
  }
}

auth.onAuthStateChanged(function(user){
  if(user){
    var email=user.email.toLowerCase();
    var profile=USER_DIR[email]||{name:email.split('@')[0],color:'#1a73e8'};
    curUser={uid:user.uid,email:email,name:profile.name,color:profile.color};
    enterApp();
  }
});
